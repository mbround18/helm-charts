helm-hub:
  env:
    ADMIN_USERNAME: "mbround18"

istio-ingress:
  enabled: true
  virtualService:
    enabled: false # We use the robust local template instead
    hosts:
      - "helm.boop.ninja"
  gateway:
    enabled: true
    selector:
      istio: ingress
    servers:
      - port:
          number: 80
          protocol: HTTP
          name: http
        hosts:
          - "helm.boop.ninja"
      - port:
          number: 443
          protocol: HTTPS
          name: https
        hosts:
          - "helm.boop.ninja"
        tls:
          mode: SIMPLE
          credentialName: "cloudflare-client-tls"
