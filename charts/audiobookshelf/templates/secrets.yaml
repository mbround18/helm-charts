{{- if .Values.secrets.jwt.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.jwt.name }}
  labels:
    {{- include "audiobookshelf.labels" . | nindent 4 }}
  {{- $annotations := include "gitops-tools.argocd.annotations" (dict "context" . "phase" "foundation") }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  JWT_SECRET_KEY: {{ .Values.env.JWT_SECRET_KEY | default (randAlphaNum 40) }}
{{- end }}
