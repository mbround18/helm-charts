apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "audiobookshelf.fullname" . }}-config
  labels:
    {{- include "audiobookshelf.labels" . | nindent 4 }}
  {{- $annotations := include "gitops-tools.argocd.annotations" (dict "context" . "phase" "foundation") }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
data:
  # Example default paths for external binaries
  FFMPEG_PATH: {{ .Values.env.FFMPEG_PATH | default "ffmpeg" }}
  FFPROBE_PATH: {{ .Values.env.FFPROBE_PATH | default "ffprobe" }}
