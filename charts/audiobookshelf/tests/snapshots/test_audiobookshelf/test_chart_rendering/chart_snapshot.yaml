apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: audiobookshelf
    app.kubernetes.io/version: 2.19.0
    helm.sh/chart: audiobookshelf-0.1.5
  name: release-name-audiobookshelf-sa
---
apiVersion: v1
data:
  FFMPEG_PATH: ffmpeg
  FFPROBE_PATH: ffprobe
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: audiobookshelf
    app.kubernetes.io/version: 2.19.0
    helm.sh/chart: audiobookshelf-0.1.5
  name: release-name-audiobookshelf-config
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: audiobookshelf
    app.kubernetes.io/version: 2.19.0
    helm.sh/chart: audiobookshelf-0.1.5
  name: release-name-audiobookshelf
spec:
  clusterIP: None
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: http
  selector:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/name: audiobookshelf
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: audiobookshelf
    app.kubernetes.io/version: 2.19.0
    helm.sh/chart: audiobookshelf-0.1.5
  name: release-name-audiobookshelf
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/name: audiobookshelf
  serviceName: release-name-audiobookshelf
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: audiobookshelf
        app.kubernetes.io/version: 2.19.0
        helm.sh/chart: audiobookshelf-0.1.5
    spec:
      containers:
      - env:
        - name: CONFIG_PATH
          value: /config
        - name: METADATA_PATH
          value: /metadata
        - name: AUDIOBOOKS_PATH
          value: /audiobooks
        image: ghcr.io/advplyr/audiobookshelf:2.19.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthcheck
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
        name: audiobookshelf
        ports:
        - containerPort: 80
          name: http
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthcheck
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        resources: {}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsGroup: 1000
          runAsUser: 1000
        volumeMounts:
        - mountPath: /config
          name: audiobookshelf-config
        - mountPath: /metadata
          name: audiobookshelf-metadata
        - mountPath: /audiobooks
          name: audiobookshelf-books
      initContainers:
      - command:
        - sh
        - -c
        - 'set -e

          TARGETS=""

          if [ -d /config ]; then TARGETS="$TARGETS /config"; fi

          if [ -d /metadata ]; then TARGETS="$TARGETS /metadata"; fi

          if [ -d /audiobooks ]; then TARGETS="$TARGETS /audiobooks"; fi

          if [ -d /podcasts ]; then TARGETS="$TARGETS /podcasts"; fi

          if [ -n "$TARGETS" ]; then chown -R 1000:1000 $TARGETS || true; fi

          '
        image: busybox:1.37.0
        name: chown-volumes
        securityContext:
          runAsGroup: 0
          runAsUser: 0
        volumeMounts:
        - mountPath: /config
          name: audiobookshelf-config
        - mountPath: /metadata
          name: audiobookshelf-metadata
        - mountPath: /audiobooks
          name: audiobookshelf-books
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsUser: 1000
      serviceAccountName: release-name-audiobookshelf-sa
  volumeClaimTemplates:
  - metadata:
      name: audiobookshelf-config
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
  - metadata:
      name: audiobookshelf-metadata
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi
  - metadata:
      name: audiobookshelf-books
    spec:
      accessModes:
      - ReadWriteMany
      resources:
        requests:
          storage: 100Gi
