apiVersion: v1
automountServiceAccountToken: true
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: enshrouded
    app.kubernetes.io/version: latest
    helm.sh/chart: enshrouded-0.3.4
  name: release-name-enshrouded
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app: enshrouded
  name: release-name-game-data
  namespace: dev-testing
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: longhorn
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: enshrouded
    app.kubernetes.io/version: latest
    helm.sh/chart: enshrouded-0.3.4
  name: release-name-enshrouded
spec:
  externalIPs:
  - null
  ports:
  - name: query-tcp
    port: 15637
    protocol: TCP
    targetPort: query-tcp
  - name: game-tcp
    port: 15636
    protocol: TCP
    targetPort: game-tcp
  - name: query-udp
    port: 15637
    protocol: UDP
    targetPort: query-udp
  - name: game-udp
    port: 15636
    protocol: UDP
    targetPort: game-udp
  selector:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/name: enshrouded
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: enshrouded
    app.kubernetes.io/version: latest
    helm.sh/chart: enshrouded-0.3.4
  name: release-name-enshrouded
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/name: enshrouded
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: enshrouded
        app.kubernetes.io/version: latest
        helm.sh/chart: enshrouded-0.3.4
    spec:
      containers:
      - image: mbround18/enshrouded-docker:v2.0.1
        imagePullPolicy: Always
        name: enshrouded
        ports:
        - containerPort: 15636
          name: game-tcp
          protocol: TCP
        - containerPort: 15637
          name: query-tcp
          protocol: TCP
        - containerPort: 15636
          name: game-udp
          protocol: UDP
        - containerPort: 15637
          name: query-udp
          protocol: UDP
        resources: {}
        securityContext: {}
        volumeMounts:
        - mountPath: /home/steam/enshrouded
          name: game-data
          readOnly: false
        - mountPath: /home/steam/backups
          name: backups
          readOnly: true
      securityContext: {}
      serviceAccountName: release-name-enshrouded
      volumes:
      - name: game-data
        persistentVolumeClaim:
          claimName: enshrouded-game-data
      - name: backups
        persistentVolumeClaim:
          claimName: enshrouded-backups
