global:
  secret:
    annotations: {}

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 10Gi

authMethod: scram-sha-256

image:
  repository: postgres
  tag: "18.3"
  pullPolicy: IfNotPresent

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsUser: 1000
  runAsGroup: 1000

ha:
  enabled: false

auth:
  password: ""
  superuserPassword: ""

secrets:
  password:
    name: postgres-password
    key: POSTGRES_PASSWORD
    create: true
  superuserPassword:
    name: postgres-superuser-password
    key: POSTGRES_PASSWORD
    create: true

postgresql:
  db: wikijs
  user: wikijs
  # Superuser configuration
  superuser: postgres

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    memory: 1Gi

service:
  type: ClusterIP
  port: 5432
