apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "postgres.fullname" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  serviceName: {{ include "postgres.fullname" . }}
  replicas: {{ if .Values.ha.enabled }}3{{ else }}1{{ end }}
  selector:
    matchLabels:
      {{- include "postgres.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # ArgoCD generates with helm template piped to kubectl apply, this is needed for helm but not argo
        {{- if or (not (hasKey .Values.global.secret.annotations "argocd.argoproj.io/resource-ignore")) (not .Values.secrets.superuserPassword.create) }}
        checksum/superuser-secret: {{ include (print $.Template.BasePath "/postgres-superuser-secret.yaml") . | sha256sum }}
        {{- end }}
      labels:
        {{- include "postgres.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: ensure-postgres-password-secret
          image: alpine:3.22
          command:
            - /bin/sh
            - -c
            - |
              set -e
              apk add --no-cache curl
              curl -LO "https://dl.k8s.io/release/v1.32.2/bin/linux/amd64/kubectl"
              chmod +x kubectl
              mv kubectl /usr/local/bin/
              SECRET_NAME="{{ .Values.secrets.password.name }}"
              NAMESPACE="$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
              until kubectl get secret "$SECRET_NAME" -n "$NAMESPACE" >/dev/null 2>&1 && \
                [ "$(kubectl get secret "$SECRET_NAME" -n "$NAMESPACE" -o jsonpath='{.data.POSTGRES_PASSWORD}')" != "" ]; do
                echo "Waiting for secret $SECRET_NAME with POSTGRES_PASSWORD..."
                sleep 2
              done
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: postgres
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.db }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.superuser | default "postgres" }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.superuserPassword.name }}
                  key: {{ .Values.secrets.superuserPassword.key }}
            - name: APP_USER
              value: {{ .Values.postgresql.user }}
            - name: APP_DB
              value: {{ .Values.postgresql.db }}
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.password.name }}
                  key: {{ .Values.secrets.password.key }}
            - name: POSTGRES_HOST_AUTH_METHOD
              value: {{ .Values.authMethod | default "scram-sha-256" }}
          ports:
            - containerPort: 5432
              name: postgres
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U {{ .Values.postgresql.superuser | default "postgres" }} -d {{ .Values.postgresql.db }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U {{ .Values.postgresql.superuser | default "postgres" }} -d {{ .Values.postgresql.db }}
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "postgres.fullname" . }}-data
        - name: init-scripts
          configMap:
            name: {{ include "postgres.fullname" . }}-init-scripts
