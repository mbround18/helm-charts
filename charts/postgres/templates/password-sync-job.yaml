apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-password-sync
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  template:
    spec:
      serviceAccountName: default
      initContainers:
      - name: wait-for-postgres
        image: alpine:3.22
        env:
        - name: PGUSER
          value: {{ .Values.postgresql.superuser | default "postgres" }}
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secrets.superuserPassword.name }}
              key: {{ .Values.secrets.superuserPassword.key }}
        command:
        - sh
        - -c
        - |
          apk add --no-cache postgresql-client
          echo "Waiting for PostgreSQL to be ready on postgres-0..."
          until pg_isready -h postgres-0.postgres -p 5432 -U "$PGUSER"; do
            echo "PostgreSQL not ready, retrying..."
            sleep 5
          done
          echo "PostgreSQL is accepting connections."
      containers:
      - name: password-sync
        image: alpine:3.22
        command:
        - sh
        - -c
        - |
          set -e
          apk add --no-cache postgresql-client
          echo "Updating password for user {{ .Values.postgresql.user }}..."
          psql -h postgres-0.postgres -p 5432 -U "$PGUSER" -d {{ .Values.postgresql.db }} \
            -c "ALTER USER {{ .Values.postgresql.user }} WITH PASSWORD '$APP_PASSWORD';"
          echo "Password updated successfully."
        env:
        - name: PGUSER
          value: {{ .Values.postgresql.superuser | default "postgres" }}
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secrets.superuserPassword.name }}
              key: {{ .Values.secrets.superuserPassword.key }}
        - name: APP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secrets.password.name }}
              key: {{ .Values.secrets.password.key }}
      restartPolicy: OnFailure
