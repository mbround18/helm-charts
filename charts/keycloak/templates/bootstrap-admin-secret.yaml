{{- if and .Values.bootstrapAdmin.create (not .Values.bootstrapAdmin.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keycloak.bootstrapAdminSecretName" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
    {{- with .Values.bootstrapAdmin.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $annotations := include "gitops-tools.argocd.annotations" (dict "context" . "phase" "foundation" "annotations" .Values.bootstrapAdmin.annotations) }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{ .Values.bootstrapAdmin.usernameKey }}: {{ required "bootstrapAdmin.username is required when bootstrapAdmin.create=true and no existing secret is configured" .Values.bootstrapAdmin.username | quote }}
  {{ .Values.bootstrapAdmin.passwordKey }}: {{ required "bootstrapAdmin.password is required when bootstrapAdmin.create=true and no existing secret is configured" .Values.bootstrapAdmin.password | quote }}
{{- end }}
