{{- if and .Values.database.createSecret (not .Values.database.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keycloak.dbSecretName" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
  {{- $annotations := include "gitops-tools.argocd.annotations" (dict "context" . "phase" "foundation") }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{ .Values.database.passwordKey }}: {{ required "database.password is required when database.createSecret=true and no existing secret is configured" .Values.database.password | quote }}
{{- end }}
