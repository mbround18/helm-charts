{{- $pvcs := list .Values.deployment.pvc .Values.saves.pvc .Values.backup.pvc}}
{{- range $idx, $pvc := $pvcs}}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $.Release.Name }}-{{ $pvc.name }}
  labels:
    {{- include "valheim.labels" $ | nindent 4 }}
  {{- $annotations := include "gitops-tools.argocd.annotations" (dict "context" $ "phase" "foundation") }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
  namespace: {{ $.Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ $pvc.size }}
  {{- if ($.Values.storageClassName) }}
  storageClassName: {{ $.Values.storageClassName }}
  {{- end }}
{{- end }}