apiVersion: v1
automountServiceAccountToken: false
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: valheim
    app.kubernetes.io/version: '3.6'
    helm.sh/chart: valheim-0.4.5
  name: release-name-valheim
  namespace: dev-testing
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: valheim
    app.kubernetes.io/version: '3.6'
    helm.sh/chart: valheim-0.4.5
  name: release-name-data
  namespace: dev-testing
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: valheim
    app.kubernetes.io/version: '3.6'
    helm.sh/chart: valheim-0.4.5
  name: release-name-saves
  namespace: dev-testing
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: valheim
    app.kubernetes.io/version: '3.6'
    helm.sh/chart: valheim-0.4.5
  name: release-name-backups
  namespace: dev-testing
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    metallb.io/loadBalancerIPs: 10.100.14.175
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: valheim
    app.kubernetes.io/version: '3.6'
    helm.sh/chart: valheim-0.4.5
  name: release-name-valheim
  namespace: dev-testing
spec:
  ports:
  - name: gameport-0
    port: 2456
    protocol: UDP
    targetPort: 2456
  - name: gameport-1
    port: 2457
    protocol: UDP
    targetPort: 2457
  - name: gameport-2
    port: 2458
    protocol: UDP
    targetPort: 2458
  - name: http
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/name: valheim
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: valheim
    app.kubernetes.io/version: '3.6'
    helm.sh/chart: valheim-0.4.5
  name: release-name-valheim
  namespace: dev-testing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/name: valheim
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: valheim
        app.kubernetes.io/version: '3.6'
        helm.sh/chart: valheim-0.4.5
    spec:
      containers:
      - env:
        - name: AUTO_BACKUP
          value: '1'
        - name: AUTO_BACKUP_DAYS_TO_LIVE
          value: '7'
        - name: AUTO_BACKUP_ON_SHUTDOWN
          value: '1'
        - name: AUTO_BACKUP_ON_UPDATE
          value: '1'
        - name: AUTO_BACKUP_REMOVE_OLD
          value: '1'
        - name: AUTO_BACKUP_SCHEDULE
          value: '*/15 * * * *'
        - name: AUTO_UPDATE
          value: '1'
        - name: AUTO_UPDATE_PAUSE_WITH_PLAYERS
          value: '1'
        - name: AUTO_UPDATE_SCHEDULE
          value: 12 * * * *
        - name: ENABLE_CROSSPLAY
          value: '0'
        - name: GUID
          value: '1000'
        - name: HTTP_PORT
          value: '8080'
        - name: NAME
          value: Valheim Docker
        - name: PASSWORD
          value: Strong! Password @ Here
        - name: PORT
          value: '2456'
        - name: PUBLIC
          value: '1'
        - name: PUID
          value: '111'
        - name: TZ
          value: America/Chicago
        - name: UPDATE_ON_STARTUP
          value: '1'
        - name: WORLD
          value: Dedicated
        image: docker.io/mbround18/valheim:3.6
        imagePullPolicy: Always
        name: valheim
        ports:
        - containerPort: 2456
          name: gameport-0
          protocol: UDP
        - containerPort: 2457
          name: gameport-1
          protocol: UDP
        - containerPort: 2458
          name: gameport-2
          protocol: UDP
        - containerPort: 8080
          name: http
          protocol: TCP
        resources: {}
        securityContext: {}
        volumeMounts:
        - mountPath: /home/steam/valheim
          name: data
          readOnly: false
        - mountPath: /home/steam/.config/unity3d/IronGate/Valheim
          name: saves
          readOnly: false
        - mountPath: /home/steam/backups
          name: backups
          readOnly: false
      securityContext: {}
      serviceAccountName: release-name-valheim
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: release-name-data
      - name: saves
        persistentVolumeClaim:
          claimName: release-name-saves
      - name: backups
        persistentVolumeClaim:
          claimName: release-name-backups
