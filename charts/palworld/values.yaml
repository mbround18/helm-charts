# Default values for palworld.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

environment: []
  # - name: MY_ENV_VAR
  #   value: my-env-var-value

storageClassName: ""

# Grace period for the game server to save world state before it's killed.
terminationGracePeriodSeconds: 90

image:
  repository: mbround18/palworld-docker
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "2.1"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

argoCd:
  mode: auto
  instanceLabel: ""
  commonAnnotations: {}
  commonLabels: {}

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: &podSecurityContext
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

securityContext: &securityContext
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

endpoint:
  externalIP: ""
  gamePort: 8211
  queryPort: 27015
  # Pinned so a Service replace/recreate doesn't reassign different external ports.
  gameNodePort: 32285
  queryNodePort: 30764

resources: &resources
  requests:
    cpu: 1000m
    memory: 2Gi
  limits:
    memory: 6Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

pvcs:
  backups:
    name: palworld-backups
    size: 10Gi
    path: /home/steam/backups
  saved:
    name: palworld-saves
    size: 10Gi
    path: /home/steam/palworld/Pal/Saved
    subPath: Saved
  server:
    name: palworld-data
    size: 30Gi
    path: /home/steam/palworld

# Settings for the reusable backup-job subchart (charts/backup-job).
# Set enabled: true to provision the backups PVC and run scheduled backups.
backup-job:
  enabled: false
  schedule: "*/5 * * * *"
  podSecurityContext: *podSecurityContext
  securityContext: *securityContext
  resources: *resources
  env:
    - name: INPUT_FOLDER
      value: "/home/steam/palworld/Pal/Saved/"
    - name: OUTPUT_FOLDER
      value: "/home/steam/backups/"
    - name: OUTPUT_USER
      value: "1000"
    - name: OUTPUT_GROUP
      value: "1000"
    - name: RETAIN_N_DAYS
      value: "7"
    - name: RETAIN_N_FILES
      value: "0"
  volumes:
    - name: palworld-saves
      persistentVolumeClaim:
        claimName: palworld-saves
    - name: palworld-backups
      persistentVolumeClaim:
        claimName: palworld-backups
  volumeMounts:
    - name: palworld-saves
      mountPath: /home/steam/palworld/Pal/Saved
      subPath: Saved
    - name: palworld-backups
      mountPath: /home/steam/backups

# Additional volumes on the output Deployment definition.
volumes: []

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
