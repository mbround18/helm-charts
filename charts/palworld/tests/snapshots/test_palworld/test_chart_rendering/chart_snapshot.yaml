apiVersion: v1
automountServiceAccountToken: true
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: palworld
    app.kubernetes.io/version: latest
    helm.sh/chart: palworld-0.3.4
  name: release-name-palworld
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app: palworld
  name: palworld-saves
  namespace: dev-testing
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
--- null
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app: palworld
  name: palworld-data
  namespace: dev-testing
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 30Gi
  storageClassName: longhorn
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: palworld
    app.kubernetes.io/version: latest
    helm.sh/chart: palworld-0.3.4
  name: release-name-palworld
spec:
  externalIPs:
  - null
  ports:
  - name: query-tcp
    port: 27015
    protocol: TCP
    targetPort: query-tcp
  - name: game-tcp
    port: 8211
    protocol: TCP
    targetPort: game-tcp
  - name: query-udp
    port: 27015
    protocol: UDP
    targetPort: query-udp
  - name: game-udp
    port: 8211
    protocol: UDP
    targetPort: game-udp
  selector:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/name: palworld
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: palworld
    app.kubernetes.io/version: latest
    helm.sh/chart: palworld-0.3.4
  name: release-name-palworld
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/name: palworld
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: palworld
        app.kubernetes.io/version: latest
        helm.sh/chart: palworld-0.3.4
    spec:
      containers:
      - image: mbround18/palworld-docker:2.1
        imagePullPolicy: Always
        name: palworld
        ports:
        - containerPort: 8211
          name: game-tcp
          protocol: TCP
        - containerPort: 27015
          name: query-tcp
          protocol: TCP
        - containerPort: 8211
          name: game-udp
          protocol: UDP
        - containerPort: 27015
          name: query-udp
          protocol: UDP
        resources: {}
        securityContext: {}
        volumeMounts:
        - mountPath: /home/steam/backups
          name: palworld-backups
        - mountPath: /home/steam/palworld/Pal/Saved
          name: palworld-saves
          subPath: Saved
        - mountPath: /home/steam/palworld
          name: palworld-data
      securityContext: {}
      serviceAccountName: release-name-palworld
      volumes:
      - name: palworld-backups
        persistentVolumeClaim:
          claimName: palworld-backups
      - name: palworld-saves
        persistentVolumeClaim:
          claimName: palworld-saves
      - name: palworld-data
        persistentVolumeClaim:
          claimName: palworld-data
