apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: syncthing
    app.kubernetes.io/version: 2.0.16
    helm.sh/chart: syncthing-0.1.1
  name: release-name-syncthing-sa
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: syncthing
    app.kubernetes.io/version: 2.0.16
    helm.sh/chart: syncthing-0.1.1
  name: release-name-syncthing-http
spec:
  ports:
  - name: http
    port: 8384
    protocol: TCP
    targetPort: http
  selector:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/name: syncthing
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: syncthing
    app.kubernetes.io/version: 2.0.16
    helm.sh/chart: syncthing-0.1.1
  name: release-name-syncthing-sync
spec:
  ports:
  - name: sync
    nodePort: null
    port: 22000
    protocol: TCP
    targetPort: sync
  selector:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/name: syncthing
  type: NodePort
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: syncthing
    app.kubernetes.io/version: 2.0.16
    helm.sh/chart: syncthing-0.1.1
  name: release-name-syncthing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/name: syncthing
  serviceName: release-name-syncthing
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: syncthing
        app.kubernetes.io/version: 2.0.16
        helm.sh/chart: syncthing-0.1.1
    spec:
      containers:
      - env: null
        image: syncthing/syncthing:2.0.16
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /rest/noauth/health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
        name: syncthing
        ports:
        - containerPort: 8384
          name: http
        - containerPort: 22000
          name: sync
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /rest/noauth/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        resources: {}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsGroup: 1000
          runAsUser: 1000
        volumeMounts:
        - mountPath: /var/syncthing
          name: syncthing-data
      initContainers:
      - command:
        - sh
        - -c
        - 'set -e

          TARGETS=""

          if [ -d /var/syncthing ]; then TARGETS="$TARGETS /var/syncthing"; fi

          if [ -n "$TARGETS" ]; then chown -R 1000:1000 $TARGETS || true; fi

          '
        env:
        - name: PASSWORD
          valueFrom:
            secretKeyRef:
              key: PASSWORD
              name: syncthing-password
        image: syncthing/syncthing:2.0.16
        name: chown-volumes
        securityContext:
          runAsGroup: 0
          runAsUser: 0
        volumeMounts:
        - mountPath: /var/syncthing
          name: syncthing-data
      - command:
        - sh
        - -c
        - 'set -e

          syncthing generate \

          --home /var/syncthing/config \

          --gui-user=$DEFAULT_USER \

          --gui-password=$PASSWORD

          '
        env:
        - name: PASSWORD
          valueFrom:
            secretKeyRef:
              key: PASSWORD
              name: syncthing-password
        - name: DEFAULT_USER
          value: admin
        image: syncthing/syncthing:2.0.16
        name: setup-password
        volumeMounts:
        - mountPath: /var/syncthing
          name: syncthing-data
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsUser: 1000
      serviceAccountName: release-name-syncthing-sa
  volumeClaimTemplates:
  - metadata:
      name: syncthing-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 30Gi
--- null
...
