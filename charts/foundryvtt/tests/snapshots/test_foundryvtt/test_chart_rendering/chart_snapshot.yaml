apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: foundryvtt
    app.kubernetes.io/version: '1.0'
    helm.sh/chart: foundryvtt-0.2.10
  name: foundryvtt-dnd-boop-ninja
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: foundryvtt
    app.kubernetes.io/version: '1.0'
    helm.sh/chart: foundryvtt-0.2.10
  name: foundryvtt-dnd-boop-ninja
spec:
  ports:
  - name: http
    port: 80
    targetPort: web
  selector:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/name: foundryvtt
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: foundryvtt
    app.kubernetes.io/version: '1.0'
    helm.sh/chart: foundryvtt-0.2.10
  name: foundryvtt-dnd-boop-ninja
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/name: foundryvtt
  serviceName: foundryvtt-dnd-boop-ninja
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/name: foundryvtt
    spec:
      containers:
      - env:
        - name: HOSTNAME
          value: dnd.boop.ninja
        - name: SSL_PROXY
          value: 'false'
        image: mbround18/foundryvtt-docker:v3.0.27
        imagePullPolicy: IfNotPresent
        name: foundryvtt
        ports:
        - containerPort: 4444
          name: web
        resources:
          limits:
            cpu: '0.3'
            memory: 1024Mi
          requests:
            cpu: '0.2'
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
          runAsGroup: 1000
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
        - mountPath: /foundryvtt
          name: app
        - mountPath: /foundrydata
          name: core
        - mountPath: /foundrydata/Backups
          name: backups
        - mountPath: /foundrydata/Config
          name: config
        - mountPath: /foundrydata/Data
          name: data
      initContainers:
      - command:
        - sh
        - -c
        - chown -R 1000:1000 /foundrydata /foundryvtt
        image: busybox:1.37.0
        name: foundry-init
        volumeMounts:
        - mountPath: /foundryvtt
          name: app
        - mountPath: /foundrydata
          name: core
        - mountPath: /foundrydata/Backups
          name: backups
        - mountPath: /foundrydata/Config
          name: config
        - mountPath: /foundrydata/Data
          name: data
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: foundryvtt-dnd-boop-ninja
      terminationGracePeriodSeconds: 30
  volumeClaimTemplates:
  - metadata:
      name: app
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 4Gi
      storageClassName: longhorn
  - metadata:
      name: core
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 2Gi
      storageClassName: longhorn
  - metadata:
      name: backups
    spec:
      accessModes:
      - ReadWriteMany
      resources:
        requests:
          storage: 10Gi
      storageClassName: longhorn
  - metadata:
      name: config
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
      storageClassName: longhorn
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteMany
      resources:
        requests:
          storage: 20Gi
      storageClassName: longhorn
---
apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: foundryvtt
    app.kubernetes.io/version: '1.0'
    helm.sh/chart: foundryvtt-0.2.10
  name: foundryvtt-dnd-boop-ninja-backup-cleanup
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - args:
            - 'apk add --no-cache findutils && find /foundrydata/Backups -type f -mtime
              +30 -delete

              '
            command:
            - /bin/sh
            - -c
            image: alpine:20260127
            name: cleanup-container
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              readOnlyRootFilesystem: false
              runAsGroup: 1000
              runAsNonRoot: true
              runAsUser: 1000
            volumeMounts:
            - mountPath: /foundrydata/Backups
              name: backups-volume
          restartPolicy: OnFailure
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
          volumes:
          - name: backups-volume
            persistentVolumeClaim:
              claimName: foundryvtt-dnd-boop-ninja-backups-0
  schedule: 0 2 * * *
