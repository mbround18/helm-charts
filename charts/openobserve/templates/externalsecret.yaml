{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "openobserve.fullname" . }}
  labels:
    {{- include "openobserve.labels" . | nindent 4 }}
  {{- $annotations := include "gitops-tools.argocd.annotations" (dict "context" . "phase" "foundation" "annotations" .Values.externalSecrets.annotations) }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.externalSecrets.secretName }}
    creationPolicy: Owner
  data:
  - secretKey: ZO_ROOT_USER_EMAIL
    remoteRef:
      key: {{ .Values.externalSecrets.keys.rootEmail }}
  - secretKey: ZO_ROOT_USER_PASSWORD
    remoteRef:
      key: {{ .Values.externalSecrets.keys.rootPassword }}
  - secretKey: ZO_S3_ACCESS_KEY
    remoteRef:
      key: {{ .Values.externalSecrets.keys.s3AccessKey }}
  - secretKey: ZO_S3_SECRET_KEY
    remoteRef:
      key: {{ .Values.externalSecrets.keys.s3SecretKey }}
  - secretKey: ZO_DATABASE_URL
    remoteRef:
      key: {{ .Values.externalSecrets.keys.databaseUrl }}
{{- end }}
