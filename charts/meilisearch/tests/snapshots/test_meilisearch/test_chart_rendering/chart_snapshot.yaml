apiVersion: v1
kind: Secret
metadata:
  annotations: null
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: meilisearch
    app.kubernetes.io/version: v1.30.0
    helm.sh/chart: meilisearch-0.1.12
  name: meilisearch-master-key
stringData:
  MEILI_MASTER_KEY: <redacted:MEILI_MASTER_KEY>
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: meilisearch
    app.kubernetes.io/version: v1.30.0
    helm.sh/chart: meilisearch-0.1.12
  name: release-name-meilisearch-data
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: meilisearch
    app.kubernetes.io/version: v1.30.0
    helm.sh/chart: meilisearch-0.1.12
  name: release-name-meilisearch
spec:
  ports:
  - name: http
    port: 7700
    targetPort: http
  selector:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/name: meilisearch
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: '10'
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: meilisearch
    app.kubernetes.io/version: v1.30.0
    helm.sh/chart: meilisearch-0.1.12
  name: release-name-meilisearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/name: meilisearch
  serviceName: release-name-meilisearch
  template:
    metadata:
      annotations:
        checksum/secret-master-key: <normalized:checksum/secret-master-key>
      labels:
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/name: meilisearch
    spec:
      containers:
      - env:
        - name: MEILI_MASTER_KEY
          valueFrom:
            secretKeyRef:
              key: MEILI_MASTER_KEY
              name: meilisearch-master-key
        image: getmeili/meilisearch:v1.41.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        name: meilisearch
        ports:
        - containerPort: 7700
          name: http
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        resources: {}
        volumeMounts:
        - mountPath: /meili_data
          name: data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: release-name-meilisearch-data
