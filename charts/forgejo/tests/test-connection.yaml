apiVersion: v1
kind: Pod
metadata:
  name: '{{ include "forgejo.fullname" . }}-test-connection'
  labels: { { - include "forgejo.labels" . | nindent 4 } }
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ["wget"]
      args:
        ['{{ include "forgejo.fullname" . }}:{{ .Values.service.http.port }}']
  restartPolicy: Never
