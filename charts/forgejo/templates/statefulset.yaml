apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "forgejo.fullname" . }}
  labels:
    {{- include "forgejo.labels" . | nindent 4 }}
  {{- $annotations := include "gitops-tools.argocd.annotations" (dict "context" . "phase" "release") }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  serviceName: {{ include "forgejo.fullname" . }}
  selector:
    matchLabels:
      {{- include "forgejo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "forgejo.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.serviceAccount.create .Values.serviceAccount.name }}
      serviceAccountName: {{ include "forgejo.serviceAccountName" . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
            - name: FORGEJO__database__DB_TYPE
              value: {{ .Values.config.database.db_type | quote }}
            - name: FORGEJO__database__HOST
              value: {{ .Values.config.database.host | quote }}
            - name: FORGEJO__database__NAME
              value: {{ .Values.config.database.name | quote }}
            - name: FORGEJO__database__USER
              value: {{ .Values.config.database.user | quote }}
            - name: FORGEJO__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: {{ include "forgejo.fullname" . }}-secrets
                  key: database-password
            - name: FORGEJO__server__DOMAIN
              value: {{ if .Values.ingress.enabled }}{{ (first .Values.ingress.hosts).host | quote }}{{ else }}{{ .Values.config.server.domain | quote }}{{ end }}
            - name: FORGEJO__server__SSH_DOMAIN
              value: {{ if .Values.ingress.enabled }}{{ (first .Values.ingress.hosts).host | quote }}{{ else }}{{ .Values.config.server.ssh_domain | quote }}{{ end }}
            - name: FORGEJO__server__ROOT_URL
              value: {{ if .Values.ingress.enabled }}http://{{ (first .Values.ingress.hosts).host }}/{{ else }}{{ .Values.config.server.root_url | quote }}{{ end }}
            - name: FORGEJO__server__HTTP_PORT
              value: {{ .Values.config.server.http_port | quote }}
            - name: FORGEJO__mirror__DEFAULT_INTERVAL
              value: {{ .Values.config.mirror.default_interval | quote }}
            - name: FORGEJO__mirror__MIN_INTERVAL
              value: {{ .Values.config.mirror.min_interval | quote }}
            - name: FORGEJO__actions__ENABLED
              value: {{ .Values.config.actions.enabled | quote }}
            - name: FORGEJO__security__INSTALL_LOCK
              value: {{ .Values.config.security.install_lock | quote }}
            - name: FORGEJO__service__DISABLE_REGISTRATION
              value: {{ .Values.config.service.disable_registration | quote }}
            - name: FORGEJO__service__ENABLE_NOTIFY_MAIL
              value: {{ .Values.config.service.enable_notify_mail | quote }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: ssh
              containerPort: 22
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
        {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
      {{- if .Values.persistence.storageClass }}
      {{- if (eq "-" .Values.persistence.storageClass) }}
        storageClassName: ""
      {{- else }}
        storageClassName: "{{ .Values.persistence.storageClass }}"
      {{- end }}
      {{- end }}