replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: codeberg.org/forgejo/forgejo
  tag: "9"
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  http:
    port: 3000
  ssh:
    type: ClusterIP
    port: 22
    nodePort: null

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: forgejo.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: null

nodeSelector: {}
affinity: {}
tolerations: []

persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  storageClass: ""

postgresql:
  enabled: true

secrets:
  databasePassword: ""
  runnerToken: ""

config:
  database:
    db_type: postgres
    host: postgresql
    name: forgejo
    user: forgejo
  server:
    domain: forgejo.local
    ssh_domain: forgejo.local
    root_url: http://forgejo.local/
    http_port: "3000"
  mirror:
    default_interval: 8h
    min_interval: 10m
  actions:
    enabled: "true"
  security:
    install_lock: "true"
  service:
    disable_registration: "true"
    enable_notify_mail: "false"

runner:
  enabled: true
  image:
    repository: code.forgejo.org/forgejo/runner
    tag: "12.9.0"
    pullPolicy: IfNotPresent
  labels: docker
  dockerSocket:
    mount: true
    path: /var/run/docker.sock

mirrorCronJob:
  enabled: false
  schedule: "0 * * * *"
  image:
    repository: ghcr.io/patnei/github2forgejo
    tag: latest
  github_user_or_org: ""
  forgejo_user: ""
  github_token: ""
  forgejo_token: ""
