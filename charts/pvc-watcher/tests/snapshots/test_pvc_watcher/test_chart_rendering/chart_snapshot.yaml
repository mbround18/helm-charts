apiVersion: v1
kind: Namespace
metadata:
  name: pvc-scaler
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pvc-scaler
  namespace: pvc-scaler
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pvc-scaler-role
rules:
- apiGroups:
  - ''
  resources:
  - clusterkopfpeerings
  - events
  verbs:
  - create
- apiGroups:
  - ''
  resources:
  - clusterkopfpeerings
  - persistentvolumeclaims
  - events
  verbs:
  - get
  - list
  - watch
  - update
  - patch
- apiGroups:
  - apps
  resources:
  - deployments
  - deployments/scale
  verbs:
  - get
  - list
  - watch
  - update
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pvc-scaler-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pvc-scaler-role
subjects:
- kind: ServiceAccount
  name: pvc-scaler
  namespace: pvc-scaler
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pvc-scaler
  namespace: pvc-scaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pvc-scaler
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: pvc-scaler
    spec:
      containers:
      - image: mbround18/k8s-pvc-watcher:latest
        imagePullPolicy: Always
        name: pvc-scaler
        resources:
          limits:
            cpu: 1000m
            memory: 256Mi
          requests:
            cpu: 500m
            memory: 128Mi
      serviceAccountName: pvc-scaler
