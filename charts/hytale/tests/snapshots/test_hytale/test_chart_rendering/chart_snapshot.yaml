apiVersion: v1
automountServiceAccountToken: true
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: hytale
    app.kubernetes.io/version: v0.0.1
    helm.sh/chart: hytale-0.1.12
  name: release-name-hytale
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app: hytale
  name: release-name-data
  namespace: dev-testing
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: hytale
    app.kubernetes.io/version: v0.0.1
    helm.sh/chart: hytale-0.1.12
  name: release-name-hytale
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/name: hytale
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: hytale
    app.kubernetes.io/version: v0.0.1
    helm.sh/chart: hytale-0.1.12
  name: release-name-hytale-nodeport
spec:
  ports:
  - name: server-udp
    nodePort: 32520
    port: 5520
    protocol: UDP
    targetPort: server-udp
  selector:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/name: hytale
  type: NodePort
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: hytale
    app.kubernetes.io/version: v0.0.1
    helm.sh/chart: hytale-0.1.12
  name: release-name-hytale
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/name: hytale
  serviceName: release-name-hytale
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: hytale
        app.kubernetes.io/version: v0.0.1
        helm.sh/chart: hytale-0.1.12
    spec:
      containers:
      - env:
        - name: PATCHLINE
          value: release
        - name: SERVER_PORT
          value: '5520'
        - name: SERVER_BIND
          value: 0.0.0.0
        - name: DISABLE_SENTRY
          value: 'false'
        - name: BOOT_COMMAND
          value: auth login device
        - name: REMOTE_CONSOLE_PORT
          value: '7000'
        - name: JAVA_MEM_LIMIT
          valueFrom:
            resourceFieldRef:
              divisor: 1Mi
              resource: limits.memory
        - name: JAVA_MEM_REQUEST
          valueFrom:
            resourceFieldRef:
              divisor: 1Mi
              resource: requests.memory
        - name: JAVA_OPTS
          value: -Xmx$(JAVA_MEM_LIMIT)m -Xms$(JAVA_MEM_REQUEST)m
        image: mbround18/hytale:v0.0.11
        imagePullPolicy: Always
        name: hytale
        ports:
        - containerPort: 5520
          name: server-udp
          protocol: UDP
        resources:
          limits:
            memory: 8Gi
          requests:
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
          runAsGroup: 1000
          runAsUser: 1000
        volumeMounts:
        - mountPath: /data/server
          name: data
          readOnly: false
      initContainers:
      - command:
        - sh
        - -c
        - "set -e\n# Ensure /data/.staging and all hidden files have correct ownership\n\
          if [ -d /data/.staging ]; then\n  chown -R 1000:1000 /data/.staging || true\n\
          fi\n# Ensure the mount path and all hidden files have correct ownership\n\
          MOUNT_PATH=\"/data/server\"\nif [ -d \"$MOUNT_PATH\" ]; then\n  chown -R\
          \ 1000:1000 \"$MOUNT_PATH\" || true\nfi\n"
        image: busybox:1.37.0
        name: chown-volumes
        securityContext:
          runAsGroup: 0
          runAsUser: 0
        volumeMounts:
        - mountPath: /data
          name: data
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      serviceAccountName: release-name-hytale
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
