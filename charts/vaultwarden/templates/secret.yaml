{{- if and .Values.vaultwarden.admin.enabled (not .Values.vaultwarden.admin.disableAdminToken) .Values.secret.create (not .Values.secret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vaultwarden.secretName" . }}
  labels:
    {{- include "vaultwarden.labels" . | nindent 4 }}
    {{- with .Values.secret.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $annotations := include "gitops-tools.argocd.annotations" (dict "context" . "phase" "foundation" "annotations" .Values.secret.annotations) }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{ .Values.secret.adminTokenKey }}: {{ required "secret.adminToken is required when secret.create=true and no existing secret is configured" .Values.secret.adminToken | quote }}
{{- end }}