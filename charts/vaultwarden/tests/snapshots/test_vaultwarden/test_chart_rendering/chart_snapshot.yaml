apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: vaultwarden
    app.kubernetes.io/version: 1.35.4
    helm.sh/chart: vaultwarden-0.1.0
  name: release-name-vaultwarden
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: http
  selector:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/name: vaultwarden
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: vaultwarden
    app.kubernetes.io/version: 1.35.4
    helm.sh/chart: vaultwarden-0.1.0
  name: release-name-vaultwarden
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/name: vaultwarden
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/name: vaultwarden
    spec:
      containers:
      - env:
        - name: ROCKET_PORT
          value: '8080'
        - name: SIGNUPS_ALLOWED
          value: 'false'
        - name: SIGNUPS_VERIFY
          value: 'false'
        - name: REQUIRE_DEVICE_EMAIL
          value: 'false'
        - name: INVITATIONS_ALLOWED
          value: 'true'
        - name: SHOW_PASSWORD_HINT
          value: 'false'
        - name: WEB_VAULT_ENABLED
          value: 'true'
        - name: SENDS_ALLOWED
          value: 'true'
        - name: ORG_CREATION_USERS
          value: all
        - name: ENABLE_DB_WAL
          value: 'true'
        - name: DOMAIN
          value: https://key.bruno.fyi
        - name: ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              key: admin-token
              name: vaultwarden
        - name: EMERGENCY_ACCESS_ALLOWED
          value: 'true'
        image: vaultwarden/server:1.35.4
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 1
        name: vaultwarden
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 1
        resources: {}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
          runAsGroup: 65534
          runAsNonRoot: true
          runAsUser: 65534
        volumeMounts:
        - mountPath: /data
          name: data
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: default
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: vaultwarden
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/hostname: key.bruno.fyi
    external-dns.alpha.kubernetes.io/ttl: '300'
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: vaultwarden
    app.kubernetes.io/version: 1.35.4
    helm.sh/chart: vaultwarden-0.1.0
  name: release-name-vaultwarden-route
spec:
  gateways:
  - vaultwarden-gateway
  hosts:
  - key.bruno.fyi
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: release-name-vaultwarden.dev-testing.svc.cluster.local
        port:
          number: 80
