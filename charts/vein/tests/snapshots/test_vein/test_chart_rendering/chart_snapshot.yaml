apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: vein
    app.kubernetes.io/version: v0.0.3
    helm.sh/chart: vein-0.1.12
  name: release-name-vein
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: vein
    app.kubernetes.io/version: v0.0.3
    helm.sh/chart: vein-0.1.12
  name: release-name-vein
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/name: vein
  serviceName: release-name-vein
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/name: vein
    spec:
      containers:
      - env:
        - name: ADMIN_STEAM_IDS
          value: ''
        - name: APP_ID
          value: '2131400'
        - name: BIND_ADDR
          value: 0.0.0.0
        - name: HEARTBEAT_INTERVAL
          value: '5.0'
        - name: INI_ENABLE
          value: 'true'
        - name: INSTALL_DIR
          value: /home/steam/vein
        - name: MAX_PLAYERS
          value: '16'
        - name: QUERY_PORT
          value: '27015'
        - name: SERVER_NAME
          value: Vein Server
        - name: SERVER_PORT
          value: '7777'
        - name: SERVER_PUBLIC
          value: 'true'
        - name: STEAM_GSLT
          value: ''
        - name: STEAM_PASSWORD
          value: ''
        - name: STEAM_USERNAME
          value: anonymous
        - name: SUPERADMIN_STEAM_IDS
          value: ''
        - name: UPDATE_ON_START
          value: 'true'
        - name: VALIDATE
          value: 'false'
        image: mbround18/vein-docker:v0.0.3
        imagePullPolicy: IfNotPresent
        name: vein
        ports:
        - containerPort: 7777
          name: server
          protocol: UDP
        - containerPort: 27015
          name: query
          protocol: UDP
        - containerPort: 27016
          name: aux
          protocol: UDP
        resources:
          limits:
            cpu: 4000m
            memory: 18Gi
          requests:
            cpu: 2000m
            memory: 4Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
          runAsGroup: 1000
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
        - mountPath: /home/steam/vein
          name: game-data
        - mountPath: /home/steam/saves
          name: saves-data
      dnsPolicy: ClusterFirstWithHostNet
      hostNetwork: true
      initContainers:
      - command:
        - sh
        - -c
        - 'mkdir -p /home/steam/vein/Vein/Saved

          ln -sfn /home/steam/saves /home/steam/vein/Vein/Saved/SaveGames

          '
        image: busybox:1.36
        name: create-symlink
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsGroup: 1000
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
        - mountPath: /home/steam/vein
          name: game-data
        - mountPath: /home/steam/saves
          name: saves-data
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: release-name-vein
  volumeClaimTemplates:
  - metadata:
      name: game-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 25Gi
      storageClassName: longhorn
  - metadata:
      name: saves-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi
      storageClassName: longhorn
