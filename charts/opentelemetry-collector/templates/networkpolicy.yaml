{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "opentelemetry-collector.fullname" . }}
  labels:
    {{- include "opentelemetry-collector.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "opentelemetry-collector.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # -- OTLP GRPC traffic
    - from: []
      ports:
        - port: 4317
          protocol: TCP
    # -- OTLP HTTP traffic
    - from: []
      ports:
        - port: 4318
          protocol: TCP
    # -- Health check
    - from: []
      ports:
        - port: 13133
          protocol: TCP
    # -- Self-observability metrics
    {{- if .Values.observability.enabled }}
    - from:
      {{- if .Values.networkPolicy.allowPrometheusScraping }}
      {{- range .Values.networkPolicy.prometheusNamespaces }}
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: {{ . | quote }}
      {{- end }}
      {{- else }}
      - {}
      {{- end }}
      ports:
        - port: 8888
          protocol: TCP
    {{- end }}
{{- end }}
