{{- if and .Values.enabled .Values.gateway.enabled }}
{{- if .Values.gatewayOverride }}
# Custom Gateway (via override)
{{ toYaml .Values.gatewayOverride }}
{{- else }}
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: {{ include "istio-ingress.gatewayName" . }}
  namespace: {{ include "istio-ingress.namespace" . }}
  labels:
    {{- include "istio-ingress.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.argoCd.syncWave | quote }}
    {{- if .Values.externalDns.enabled }}
    {{- toYaml .Values.externalDns.annotations | nindent 4 }}
    {{- end }}
spec:
  selector:
    {{- toYaml .Values.gateway.selector | nindent 4 }}
  servers:
    {{- range $server := .Values.gateway.servers }}
    - name: {{ $server.port.name }}
      port:
        number: {{ $server.port.number | required "port.number is required" }}
        protocol: {{ $server.port.protocol | default "HTTP" }}
        name: {{ $server.port.name | default (printf "port-%d" $server.port.number) }}
      hosts:
        {{- toYaml $server.hosts | nindent 8 }}
      {{- if or (eq (upper $server.port.protocol) "HTTPS") (eq (upper $server.port.protocol) "TLS") }}
      tls:
        {{- if $server.tls }}
        {{- toYaml $server.tls | nindent 8 }}
        {{- else }}
        mode: {{ $.Values.tls.mode | default "SIMPLE" }}
        credentialName: {{ $.Values.tls.credentialName | default "cloudflare-client-tls" }}
        {{- if and $.Values.tls.serverCertificate $.Values.tls.privateKey }}
        serverCertificate: {{ $.Values.tls.serverCertificate }}
        privateKey: {{ $.Values.tls.privateKey }}
        {{- end }}
        {{- end }}
      {{- end }}
    {{- end }}
{{- end }}
{{- end }}
