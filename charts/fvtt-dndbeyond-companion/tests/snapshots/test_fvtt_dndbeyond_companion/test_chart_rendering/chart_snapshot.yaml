apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: fvtt-dndbeyond-companion
    app.kubernetes.io/version: v1.1.0
    helm.sh/chart: fvtt-dndbeyond-companion-0.0.4
  name: release-name-fvtt-dndbeyond-companion
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: fvtt-dndbeyond-companion
    app.kubernetes.io/version: v1.1.0
    helm.sh/chart: fvtt-dndbeyond-companion-0.0.4
  name: release-name-fvtt-dndbeyond-companion
spec:
  ports:
  - name: http
    port: 8745
    protocol: TCP
    targetPort: http
  selector:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/name: fvtt-dndbeyond-companion
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: fvtt-dndbeyond-companion
    app.kubernetes.io/version: v1.1.0
    helm.sh/chart: fvtt-dndbeyond-companion-0.0.4
  name: release-name-fvtt-dndbeyond-companion
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/name: fvtt-dndbeyond-companion
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/name: fvtt-dndbeyond-companion
    spec:
      containers:
      - image: mbround18/fvtt-dndbeyond-companion:v1.1.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
        name: fvtt-dndbeyond-companion
        ports:
        - containerPort: 8745
          name: http
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
        resources: {}
      serviceAccountName: release-name-fvtt-dndbeyond-companion
---
apiVersion: v1
kind: Pod
metadata:
  annotations:
    helm.sh/hook: test
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: fvtt-dndbeyond-companion
    app.kubernetes.io/version: v1.1.0
    helm.sh/chart: fvtt-dndbeyond-companion-0.0.4
  name: release-name-fvtt-dndbeyond-companion-test-connection
spec:
  containers:
  - args:
    - release-name-fvtt-dndbeyond-companion:8745/healthz
    command:
    - wget
    image: busybox
    name: wget
  restartPolicy: Never
