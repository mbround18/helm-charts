{{- if .Values.externalSecrets.enabled }}
{{- $annotations := include "gitops-tools.argocd.annotations" (dict "context" . "phase" "foundation" "annotations" .Values.externalSecrets.annotations) }}
---
{{- if eq (default "generator" .Values.externalSecrets.mode) "generator" }}
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: {{ include "grafana.fullname" . }}-admin-password
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  length: {{ .Values.externalSecrets.generator.passwordLength }}
  allowRepeat: true
  noUpper: false
  secretKeys:
    - password
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: {{ include "grafana.fullname" . }}-database-password
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  length: {{ .Values.externalSecrets.generator.passwordLength }}
  allowRepeat: true
  noUpper: false
  secretKeys:
    - password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "grafana.fullname" . }}-admin
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  refreshPolicy: CreatedOnce
  target:
    name: {{ .Values.grafana.admin.existingSecret }}
    creationPolicy: Owner
    template:
      metadata:
        annotations:
          {{- .Values.externalSecrets.annotations | toYaml | nindent 10 }}
      data:
        user: {{ .Values.externalSecrets.admin.user | quote }}
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: {{ include "grafana.fullname" . }}-admin-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "grafana.fullname" . }}-database
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  refreshPolicy: CreatedOnce
  target:
    name: {{ .Values.grafana.database.existingSecret }}
    creationPolicy: Owner
    template:
      metadata:
        annotations:
          {{- .Values.externalSecrets.annotations | toYaml | nindent 10 }}
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: {{ include "grafana.fullname" . }}-database-password
{{- else }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "grafana.fullname" . }}-admin
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore }}
    kind: {{ .Values.externalSecrets.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.grafana.admin.existingSecret }}
    creationPolicy: Owner
    template:
      metadata:
        annotations:
          {{- .Values.externalSecrets.annotations | toYaml | nindent 10 }}
  data:
    - secretKey: user
      remoteRef:
        key: {{ .Values.externalSecrets.admin.userKey }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecrets.admin.passwordKey }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "grafana.fullname" . }}-database
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore }}
    kind: {{ .Values.externalSecrets.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.grafana.database.existingSecret }}
    creationPolicy: Owner
    template:
      metadata:
        annotations:
          {{- .Values.externalSecrets.annotations | toYaml | nindent 10 }}
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecrets.database.passwordKey }}
{{- end }}
{{- end }}
