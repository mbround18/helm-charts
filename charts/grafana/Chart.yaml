apiVersion: v2
name: grafana
description: A wrapper chart for Grafana with opinionated Istio and GitOps integrations.
type: application
version: 0.1.0
appVersion: "10.4.1" # Align with a recent Grafana version

dependencies:
  - name: grafana
    version: "7.3.11" # Use a specific, tested version of the upstream chart
    repository: "https://grafana.github.io/helm-charts"
    alias: upstream-grafana
  - name: istio-ingress
    version: "0.1.8"
    repository: "file://../istio-ingress"
  - name: gitops-tools
    version: "0.1.1"
    repository: "file://../gitops-tools"
