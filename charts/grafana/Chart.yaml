apiVersion: v2
name: grafana
description: A wrapper chart for Grafana with opinionated Istio and GitOps integrations.
type: application
version: 0.1.1
appVersion: 10.4.1
dependencies:
- name: grafana
  version: 7.3.12
  repository: https://grafana.github.io/helm-charts
  alias: upstream-grafana
- name: istio-ingress
  version: 0.1.10
  repository: file://../istio-ingress
- name: gitops-tools
  version: 0.1.1
  repository: file://../gitops-tools
