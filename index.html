<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>helm-charts — Helm Charts</title>
  <script src="https://cdn.jsdelivr.net/npm/flexsearch@0.7.43/dist/flexsearch.bundle.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --accent: #58a6ff;
      --accent2: #1f6feb;
      --green: #3fb950;
      --tag-bg: #1f2f3f;
      --tag-text: #79c0ff;
      --code-bg: #161b22;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }
    header h1 a { color: inherit; text-decoration: none; }
    header h1 a:hover { color: var(--accent); }
    .helm-add {
      font-size: 0.78rem;
      color: var(--text2);
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.35rem 0.75rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: border-color 0.15s;
    }
    .helm-add:hover { border-color: var(--accent); color: var(--accent); }
    .copy-icon { font-size: 0.9rem; }
    #search-wrap {
      flex: 1;
      max-width: 480px;
    }
    #search {
      width: 100%;
      padding: 0.5rem 0.85rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #search::placeholder { color: var(--text2); }
    #search:focus { border-color: var(--accent); }
    .stats {
      color: var(--text2);
      font-size: 0.8rem;
      white-space: nowrap;
    }
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    #results-count {
      color: var(--text2);
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
    }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover { border-color: var(--accent2); box-shadow: var(--shadow); }
    .card.open { border-color: var(--accent); }
    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
    }
    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      object-fit: contain;
      background: var(--bg3);
      padding: 4px;
      flex-shrink: 0;
    }
    .card-icon-placeholder {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .card-title { font-size: 1rem; font-weight: 600; color: var(--text); }
    .card-title a { color: inherit; text-decoration: none; }
    .card-title a:hover { color: var(--accent); }
    .card-version { font-size: 0.78rem; color: var(--text2); margin-top: 2px; }
    .card-desc {
      font-size: 0.85rem;
      color: var(--text2);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .tag {
      font-size: 0.72rem;
      background: var(--tag-bg);
      color: var(--tag-text);
      border-radius: 4px;
      padding: 0.15rem 0.5rem;
    }
    .card-detail {
      display: none;
      flex-direction: column;
      gap: 0.75rem;
      border-top: 1px solid var(--border);
      padding-top: 0.75rem;
    }
    .card.open .card-detail { display: flex; }
    .version-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .version-label { font-size: 0.8rem; color: var(--text2); }
    .version-select {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      padding: 0.25rem 0.5rem;
      font-size: 0.8rem;
      cursor: pointer;
      outline: none;
    }
    .version-select:focus { border-color: var(--accent); }
    .install-cmd {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.78rem;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      color: var(--green);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      word-break: break-all;
    }
    .copy-btn {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .copy-btn:hover { color: var(--accent); }
    .values-toggle {
      font-size: 0.78rem;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-align: left;
    }
    .values-toggle:hover { text-decoration: underline; }
    .values-block {
      display: none;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem;
      max-height: 320px;
      overflow-y: auto;
    }
    .values-block.open { display: block; }
    .values-block pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.72rem;
      color: var(--text2);
      white-space: pre;
      line-height: 1.55;
    }
    .no-results {
      text-align: center;
      color: var(--text2);
      padding: 4rem 0;
      font-size: 1rem;
    }
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text2);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }
    footer a { color: var(--accent); text-decoration: none; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.15rem 0.5rem;
      font-size: 0.72rem;
      color: var(--text2);
    }
    .badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; }
    @media (max-width: 640px) {
      header { flex-wrap: wrap; padding: 1rem; }
      #search-wrap { order: 3; flex: 0 0 100%; max-width: 100%; }
      .helm-add { display: none; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <header>
    <h1><a href="https://github.com/mbround18/helm-charts">helm-charts</a></h1>
    <div id="search-wrap">
      <input id="search" type="search" placeholder="Search charts…" autocomplete="off" />
    </div>
    <button class="helm-add" onclick="copyHelmRepo(this)" title="Copy helm repo add command">
      <span class="copy-icon">⎘</span>
      <span>helm repo add mbround18 https://mbround18.github.io/helm-charts</span>
    </button>
    <span class="stats" id="stats"></span>
  </header>
  <main>
    <div id="results-count"></div>
    <div class="grid" id="grid"></div>
    <div class="no-results" id="no-results" style="display:none">No charts match your search.</div>
  </main>

    <code>helm repo add mbround18 https://mbround18.github.io/helm-charts</code>
  </footer>

nted volumes to the rootless UID/GID\n  enabled: true\n  image: busybox:1.37.0\n  # Extra directories the chown init container should ensure (optional)\n  extraDirs: []\n","0.1.14":"image:\n  repository: ghcr.io/advplyr/audiobookshelf\n  tag: 2.35.0\n  pullPolicy: IfNotPresent\n\nreplicaCount: 1\n\nservice:\n  port: 80\n\npersistence:\n  config:\n    enabled: true\n    storageClassName: \"\"\n    size: 10Gi\n    claimName: audiobookshelf-config\n    mountPath: /config\n  metadata:\n    enabled: true\n    storageClassName: \"\"\n    size: 20Gi\n    claimName: audiobookshelf-metadata\n    mountPath: /metadata\n  audiobooks:\n    enabled: true\n    storageClassName: \"\"\n    size: 100Gi\n    claimName: audiobookshelf-books\n    mountPath: /audiobooks\n  podcasts:\n    enabled: false\n    storageClassName: \"\"\n    size: 10Gi\n    claimName: audiobookshelf-podcasts\n    mountPath: /podcasts\n\nenv: {}\n# Example overrides:\n# env:\n#   HOST: 127.0.0.1\n#   PORT: \"13378\"\n#   TZ: \"UTC\"\n#   FFMPEG_PATH: ffmpeg\n#   FFPROBE_PATH: ffprobe\n\nistio-ingress:\n  enabled: false\n  virtualService:\n    route:\n      host: audiobookshelf\n      port: 80\n\nargoCd:\n  mode: auto\n  instanceLabel: \"\"\n  commonAnnotations: {}\n  commonLabels: {}\n\ningress:\n  enabled: false\n  hosts:\n    - host: audiobookshelf.local\n      paths:\n        - /\n\nbackups:\n  enabled: false\n  image: mbround18/backup-cron:v1.0.0\n  schedule: 0 3 * * *\n  retainNDays: \"7\"\n  retainNFiles: \"10\"\n\nresources: {}\n\nserviceAccount:\n  create: true\n  name: \"\"\n\nsecrets:\n  # JWT secret config\n  jwt:\n    create: false\n    name: audiobookshelf-jwt\n    key: JWT_SECRET_KEY\n\nnodeSelector: {}\ntolerations: []\naffinity: {}\n\n# Pod security and chown init container\nsecurityContext:\n  runAsUser: 1000\n  runAsGroup: 1000\n  fsGroup: 1000\n\ninitChown:\n  # If enabled, an initContainer will chown the mounted volumes to the rootless UID/GID\n  enabled: true\n  image: busybox:1.37.0\n  # Ex \n\nserviceAccount:\n  # Specifies whether a service account should be created\n  create: true\n  # Annotations to add to the service account\n  annotations: {}\n  # The name of the service account to use.\n  # If not set and create is true, a name is generated using the fullname template\n  name: \"\"\n\npodAnnotations: {}\n\nservice:\n  type: ClusterIP\n  port: 8745\n\ningress:\n  enabled: false\n  className: \"\"\n  annotations: {}\n    # kubernetes.io/ingress.class: nginx\n    # kubernetes.io/tls-acme: \"true\"\n  hosts:\n    - host: chart-example.local\n      paths:\n        - path: /\n          pathType: ImplementationSpecific\n  tls: []\n  #  - secretName: chart-example-tls\n  #    hosts:\n  #      - chart-example.local\n\nresources: {}\n  # We usually recommend not to specify default resources and to leave this as a conscious\n  # choice for the user. This also increases chances charts run on environments with little\n  # resources, such as Minikube. If you do want to specify resources, uncomment the following\n  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.\n  # limits:\n  #   cpu: 100m\n  #   memory: 128Mi\n  # requests:\n  #   cpu: 100m\n  #   memory: 128Mi\n\nautoscaling:\n  enabled: false\n  minReplicas: 1\n  maxReplicas: 100\n  targetCPUUtilizationPercentage: 80\n  # targetMemoryUtilizationPercentage: 80\n\nnodeSelector: {}\n\ntolerations: []\n\naffinity: {}\n"}},{"name":"game-tools","description":"Shared helper subchart for game server deployments","appVersion":"","latestVersion":"0.1.8","icon":"","home":"","keywords":[],"versions":["0.1.8","0.1.7","0.1.0"],"valuesByVersion":{"0.1.8":""}},{"name":"gitops-tools","description":"Shared helper library for GitOps-oriented Helm metadata helpers","appVersion":"","latestVersion":"0.1.1","icon":"","home":"","keywords":[],"versions":["0.1.1","0.1.0"],"valuesByVersion":{"0.1.1":""}},{"name":"grafana","description":"A wrapper chart for Grafana with opinionated Istio and GitOps integrations.","appVersion":"10.4.1","latestVersion":"0.1.11","icon":"","home":"","keywords":[],"versions":["0.1.11","0.1.9","0.1.8","0.1.7","0.1.5","0.1.4","0.1.3","0.1.2","0.1.1","0.1.0"],"valuesByVersion":{"0.1.0":"# Global settings for the entire application stack\nglobal:\n  domain: \"example.com\"\n  environment: \"production\"\n  # Global Istio settings\n  istio:\n    namespace: \"istio-system\"\n\n# Main Grafana application configuration\ngrafana:\n  # Controls anonymous access to Grafana\n  anonymous:\n    enabled: false\n  # Admin user password management. Create a secret with a 'password' key.\n  # Example: kubectl create secret generic grafana-admin-creds --from-literal=password='your-secret-password'\n  admin:\n    existingSecret: \"grafana-admin-creds\"\n  # Persistence configuration using a PVC\n  persistence:\n    enabled: true\n    size: \"10Gi\"\n    storageClassName: \"standard\"\n  # External database configuration (PostgreSQL)\n  database:\n    type: \"postgres\"\n    host: \"postgres-postgresql.database.svc.cluster.local\"\n    port: 5432\n    name: \"grafana\"\n    user: \"grafana\"\n    existingSecret: \"grafana-db-credentials\" # Secret with 'password' key\n\n# Istio Ingress configuration\nistio-ingress:\n  enabled: true\n  virtualService:\n    hosts:\n      - \"grafana.example.com\"\n  tls:\n    enabled: true\n    mode: \"SIMPLE\" # Assumes TLS termination at the gateway\n    credentialName: \"grafana-tls-cert\" # Secret containing tls.crt and tls.key\n\n# GitOps Tools (ArgoCD) configuration\ngitops-tools:\n  argoCd:\n    mode: \"auto\" # 'enabled', 'disabled', or 'auto'\n    instanceLabel: \"primary\"\n    commonAnnotations:\n      notifications.argoproj.io/subscribe.on-deployed: \"grafana-deploys\"\n\n# Upstream Grafana chart values\n# We alias it to 'upstream-grafana' to avoid conflicts and make it clear\n# which values are being passed to the subchart.\nupstream-grafana:\n  # Pass admin password from our secret\n  admin:\n    existingS  true\n    size: \"10Gi\"\n    storageClassName: \"longhorn\"\n  # External database configuration (PostgreSQL)\n  database:\n    type: \"postgres\"\n    host: \"postgres-postgresql.database.svc.cluster.local\"\n    port: 5432\n    name: \"grafana\"\n    user: \"grafana\"\n    existingSecret: \"grafana-db-credentials\" # Secret with 'password' key\n\n# Istio Ingress configuration\nistio-ingress:\n  enabled: true\n  virtualService:\n    hosts:\n      - \"grafana.example.com\"\n  tls:\n    enabled: true\n    mode: \"SIMPLE\" # Assumes TLS termination at the gateway\n    credentialName: \"grafana-tls-cert\" # Secret containing tls.crt and tls.key\n\n# GitOps Tools (ArgoCD) configuration\nargoCd:\n  mode: \"auto\"\n  instanceLabel: \"\"\n  commonAnnotations: {}\n  commonLabels: {}\n\ngitops-tools:\n  argoCd:\n    mode: \"auto\" # 'enabled', 'disabled', or 'auto'\n    instanceLabel: \"primary\"\n    commonAnnotations:\n      notifications.argoproj.io/subscribe.on-deployed: \"grafana-deploys\"\n\n# Optional ExternalSecrets integration.\n# When enabled, the chart creates the admin and database secrets expected by Grafana.\nexternalSecrets:\n  enabled: false\n  annotations: {}\n  defaults:\n    refreshPolicy: \"CreatedOnce\"\n    target:\n      creationPolicy: \"Orphan\"\n      deletionPolicy: \"Retain\"\n      annotations:\n        argocd.argoproj.io/compare-options: \"IgnoreExtraneous\"\n        argocd.argoproj.io/sync-options: \"Prune=false,Delete=false\"\n      labels: {}\n  generator:\n    passwordLength: 32\n    allowRepeat: true\n    noUpper: false\n  secrets:\n    admin:\n      mode: \"generator\"\n      targetName: \"grafana-admin-creds\"\n      generator:\n        name: \"grafana-admin-password\"\n      target:\n        data:\n          user: \"admin\"\n          password: \"{{ .password }}\"\n    database:\n      mode: \"generator\"\n      targetName: \"grafana-db-credentials\"\n      generator:\n        name: \"grafana-db-password\"\n\n# Upstream Grafana chart v xistingSecret: \"grafana-admin-creds\"\n  # Persistence configuration using a PVC\n  persistence:\n    enabled: true\n    size: \"10Gi\"\n    storageClassName: \"longhorn\"\n  # Database configuration (default sqlite on PVC)\n  database:\n    type: \"sqlite3\"\n    existingSecret: \"grafana-db-credentials\" # Secret with 'password' key\n\n# Istio Ingress configuration\nistio-ingress:\n  enabled: true\n  virtualService:\n    hosts:\n      - \"grafana.example.com\"\n  tls:\n    enabled: true\n    mode: \"SIMPLE\" # Assumes TLS termination at the gateway\n    credentialName: \"grafana-tls-cert\" # Secret containing tls.crt and tls.key\n\n# GitOps Tools (ArgoCD) configuration\nargoCd:\n  mode: \"auto\"\n  instanceLabel: \"\"\n  commonAnnotations: {}\n  commonLabels: {}\n\ngitops-tools:\n  argoCd:\n    mode: \"auto\" # 'enabled', 'disabled', or 'auto'\n    instanceLabel: \"primary\"\n    commonAnnotations:\n      notifications.argoproj.io/subscribe.on-deployed: \"grafana-deploys\"\n\n# Optional ExternalSecrets integration.\n# When enabled, the chart creates the admin and database secrets expected by Grafana.\nexternalSecrets:\n  enabled: false\n  annotations: {}\n  defaults:\n    refreshPolicy: \"CreatedOnce\"\n    target:\n      creationPolicy: \"Owner\"\n      deletionPolicy: \"Retain\"\n      annotations:\n        argocd.argoproj.io/compare-options: \"IgnoreExtraneous\"\n        argocd.argoproj.io/sync-options: \"Prune=false,Delete=false\"\n      labels: {}\n  generator:\n    passwordLength: 32\n    allowRepeat: true\n    noUpper: false\n  secrets:\n    admin:\n      mode: \"generator\"\n      targetName: \"grafana-admin-creds\"\n      generator:\n        name: \"grafana-admin-password\"\n      target:\n        data:\n          user: \"admin\"\n          password: \"{{ .password }}\"\n    database:\n      mode: \"generator\"\n      targetName: \"grafana-db-credentials\"\n      generator:\n        name: \"grafana-db-password\"\n\n# Upstream Grafana chart values\n# We alias it to 'upstream-grafana' to avoid conflicts and make it clear\n# which values are being passed to the subchart.\nupstream-grafana:\n  # Pass admin password from our secret\n  admin:\n    existingSecret: \"grafana-admin-creds\"\n    userKey: \"user\" # Assuming user is also in the secret, otherwise remove\n    passwordKey: \"password\"\n\n  # Enable provisioning of dashboards and datasources from ConfigMaps\n  sidecar:\n    dashboards:\n      enabled: true\n      label: \"grafana_dashboard\"\n    datasources:\n      enabled: true\n      label: \"grafana_datasource\"\n\n  # Configure persistence\n  persistence:\n    enabled: true\n    type: \"pvc\"\n    size: \"10Gi\"\n    storageClassName: \"longhorn\"\n    accessModes:\n      - ReadWriteOnce\n\n  # Use sqlite by default (can be overridden to postgres per-environment)\n  grafana.ini:\n    database:\n      type: \"sqlite3\"\n    auth.anonymous:\n      enabled: false\n\n  # ServiceMonitor settings for Prometheus\n  serviceMonitor:\n    enabled: true\n    labels:\n      release: \"prometheus\" # Label to match your Prometheus Operator\n\n  # Mount the database password secret\n  extraSecretMounts:\n    - name: grafana-db-secret-mount\n      secretName: \"grafana-db-credentials\"\n      mountPath: \"/etc/grafana/secrets\"\n      readOnly: true\n"}},{"name":"helm-hub","description":"A Helm chart for Helm Hub - a modern helm chart repository.","appVersion":"1.0.0","latestVersion":"0.1.3","icon":"","home":"","keywords":[],"versions":["0.1.3","0.1.2"],"valuesByVersion":{"0.1.2":"replicaCount: 1\n\nautoscaling:\n  enabled: false\n  minReplicas: 1\n  maxReplicas: 100\n  targetCPUUtilizationPercentage: 80\n  # targetMemoryUtilizationPercentage: 80\n\nimage:\n  repository: mbround18/helmhub\n  tag: latest\n  pullPolicy: Always\n  command: [\"/app/helm-hub\"]\n\nservice:\n  type: ClusterIP\n  port: 80\n  targetPort: 3000\n  annotations: {}\n\nmetrics:\n  enabled: true\n  port: 9090\n\npersistence:\n  enabled: true\n  storage b-password\"\n  postgresql:\n    db: helmhub\n    user: helmhub\n  persistence:\n    size: 5Gi\n    storageClass: \"\"\n\nnodeSelector: {}\ntolerations: []\naffinity: {}\n","0.1.3":"replicaCount: 1\n\nautoscaling:\n  enabled: false\n  minReplicas: 1\n  maxReplicas: 100\n  targetCPUUtilizationPercentage: 80\n  # targetMemoryUtilizationPercentage: 80\n\nimage:\n  repository: mbround18/helmhub\n  tag: latest\n  pullPolicy: Always\n  command: [\"/app/helm-hub\"]\n\nservice:\n  type: ClusterIP\n  port: 80\n  targetPort: 3000\n  annotations: {}\n\nmetrics:\n  enabled: true\n  port: 9090\n\npersistence:\n  enabled: true\n  storageClassName: \"\"\n  size: 10Gi\n  accessMode: ReadWriteMany\n  mountPath: /data\n  annotations: {}\n  # existingClaim: \"\"\n\n# Database configuration\ndatabase:\n  # If enabled, uses the postgres subchart\n  enabled: true\n  host: \"\"\n  port: 5432\n  name: helmhub\n  user: helmhub\n  # password: \"\"\n  # existingSecret: \"\"\n\nenv:\n  # JWT_SECRET: \"\"\n  # FARO_URL: \"\"\n  # OTEL_EXPORTER_OTLP_ENDPOINT: \"\"\n  TZ: \"UTC\"\n  CLAMAV_ENABLED: \"false\"\n  CHOWN: \"false\"\n  ADMIN_USERNAME: \"changeme\"\n\nsecrets: {}\n\nistio-ingress:\n  enabled: false\n  virtualService:\n    enabled: false\n    hosts:\n      - helm-hub.local\n  # Example for production clusters:\n  # externalDns:\n  #   enabled: true\n  #   annotations:\n  #     external-dns.alpha.kubernetes.io/hostname: \"helm.example.com\"\n  # tls:\n  #   enabled: true\n  #   # credentialName: \"cloudflare-client-tls\" # Now the default if enabled\n  # gateway:\n  #   servers:\n  #     - port:\n  #         number: 80\n  #         protocol: HTTP\n  #         name: http\n  #       hosts: [\"helm.example.com\"]\n  #     - port:\n  #         number: 443\n  #         protocol: HTTPS\n  #         name: https\n  #       hosts: [\"helm.example.com\"]\n\nargoCd:\n  mode: auto\n  instanceLabel: \"\"\n  commonAnnotations: {}\n  commonLabels: {}\n\ningress:\n  enabled: false\n  className: \"\"\n  annotations: {}\n  hosts:\n    - host: helm-hub.local\n      paths:\n        - path: /\n          pathType: Prefix\n  tls: []\n\nresources:\n  requests:\n    cpu: 100m\n    memory: 128Mi\n  limits:\n    memory: 256Mi\n\nserviceAccount:\n  create: true\n  annotations: {}\n  name: \"\"\n\ndeploymentAnnotations: {}\npodAnnotations: {}\npodLabels: {}\n\npodSecurityContext:\n  fsGroup: 1000\n\nsecurityContext:\n  runAsUser: 1000\n  runAsGroup: 1000\n\n# Dependency: Postgres subchart settings\npostgres:\n  enabled: true\n  fullnameOverride: helm-hub-db\n  auth:\n    database: helmhub\n    username: helmhub\n    password: \"helmhub-password\"\n  postgresql:\n    db: helmhub\n    user: helmhub\n  persistence:\n    size: 5Gi\n    storageClass: \"\"\n\nnodeSelector: {}\ntolerations: []\naffinity: {}\n"}},{"name":"hytale","description":"A Helm chart for the Hytale dedicated server","appVersion":"v0.0.1","latestVersion":"0.1.22","icon":"","home":"","keywords":[],"versions":["0.1.22","0.1.21","0.1.20","0.1.19","0.1.18","0.1.16","0.1.15","0.1.11","0.1.10","0.1.9","0.1.8","0.1.7","0.1.6","0.1.5","0.1.4","0.1.3","0.1.2","0.1.1","0.1.0"],"valuesByVersion":{"0.1.21":"# Default values for hytale.\n# This is a YAML-formatted file.\n# Declare variables to be passed into your templates.\n\nreplicaCount: 1\n\n# Environment variables to pass to the application\nenvironment:\n  - name: PATCHLINE\n    value: release\n  - name: SERVER_PORT\n    value: \"5520\"\n  - name: SERVER_BIND\n    value: 0.0.0.0\n  - name: DISABLE_SENTRY\n    value: \"false\"\n  - name: BOOT_COMMAND\n    value: auth login device\n  - name: REMOTE_CONSOLE_PORT\n    value: \"7000\"\n\n# Optional: derive JAVA_OPTS from container resources (requests/limits)\n# When enabled, remove JAVA_OPTS from the environment list to avoid duplicates.\njavaOpts:\n  auto: true\n  name: JAVA_OPTS\n  # Env vars populated from resources.*.memory using the Downward API\n  limitEnv: JAVA_MEM_LIMIT\n  requestEnv: JAVA_MEM_REQUEST\n  # Divisor for resourceFieldRef; \"1Mi\" yields integer Mi values\n  divisor: 1Mi\n  # Suffix appended to the generated -Xmx/-Xms values\n  unitSuffix: m\n\n# The name of the storage class to use. If not set, the default storage class will be used.\nstorageClassName: \"\"\n\n# Configuration for the application image\nimage:\n  repository: mbround18/hytale\n  pullPolicy: Always\n  # Overrides the image tag whose default is the chart appVersion.\n  tag: \"v0.0.11\"\n\nimagePullSecrets: []\nnameOverride: \"\"\nfullnameOverride: \"\"\n\nargoCd:\n  mode: auto\n  instanceLabel: \"\"\n  commonAnnotations: {}\n  commonLabels: {}\n\nserviceAccount:\n  # Specifies whether a service account should be created\n  create: true\n  # Automatically mount a ServiceAccount's API credentials?\n  automount: true\n  # Annotations to add to the service account\n  annotations: {}\n  # The name of the service account to use.\n  # If not set and create is true, a name is generated using the fullname template\n  name: \"\"\n\npodAnnotations: {}\npodLabels: {}\n\npodSecurityContext:\n  fsGroup: 1000\n  fsGroupChangePolicy: OnRootMismatch\n\nsecurityContext:\n  allowPrivilegeEscalation: false\n  capabilities:\n    drop:\n      - ALL\n  readOnlyRootFilesystem: false\n  runAsNonRoot: true\n  runAsUser: 1000\n  runAsGroup: 1000\n\nendpoint:\n  externalIP: \"\"\n  serverPort: 5520\n  # consolePort: 7000\n\nresources:\n  # We usually recommend not to specify default resources and to leave this as a conscious\n  # choice for the user. This also increases chances charts run on environments with little\n  # resources, such as Minikube. If you do want to specify resources, uncomment the following\n  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.\n  limits:\n    memory: 8Gi\n  requests:\n    memory: 1Gi\n\n# Health check probes for the game server\nprobes:\n  liveness: # Still WIP\n    enabled: false\n    # Check if the UDP game port is listening\n    initialDelaySeconds: 60\n    periodSeconds: 30\n    timeoutSeconds: 5\n    failureThreshold: 3\n    successThreshold: 1\n  readiness: # Still WIP\n    enabled: false\n    # Check if the server is ready to accept connections\n    # High initial delay and failure threshold to account for game/mod downloads on first boot\n    initialDelaySeconds: 300\n    periodSeconds: 30\n    timeoutSeconds: 5\n    failureThreshold: 20\n    successThreshold: 1\n\npvc:\n  name: data\n  size: 10Gi\n  # Path where the persistent volume will be mounted in the container\n  # Defaults to /data/server so /data/.staging and other temp files can be wiped on restart\n  mountPath: /data/server\n\nservice:\n  # Whether to create the externally-accessible Service (NodePort/ClusterIP).\n  # Set to false to omit creating the service (useful when using Ingress or to avoid NodePort resources).\n  create: true\n  # Type of the external Service. Common values: NodePort, ClusterIP, LoadBalancer\n  type: NodePort\n  # Explicit nodePort for the server (only has effect when type=NodePort). Use null to let k8s auto-assign\n  nodePortServer: 32520\n  # Explicit nodePort for the console (only has effect when type=NodePort)\n  nodePortConsole:\n  # Service annotations (useful for MetalLB or other controllers)\n  annotations: {}\n\ninitChown:\n  # When enabled, an init container will chown mounted volumes to the non-root UID/GID\n  enabled: true\n  # A small image with sh and chown (default: busybox). Can be overridden if your distro needs different tools.\n  image: busybox:1.37.0\n  # Extra directories to chown in addition to /data\n  extraDirs: []\n\n# Optional envFrom references to import many env vars from a ConfigMap or Secret\nenvFrom:\n  # Name of a ConfigMap whose keys should be imported as env vars (optional)\n  configMapName: \"\"\n  # If true, the configMapRef will be marked optional\n  configMapOptional: false\n  # Name of a Secret whose keys should be imported as env vars (optional)\n  secretName: \"\"\n  # If true, the secret ePort resources).\n  create: true\n  # Type of the external Service. Common values: NodePort, ClusterIP, LoadBalancer\n  type: NodePort\n  # Explicit nodePort for the server (only has effect when type=NodePort). Use null to let k8s auto-assign\n  nodePortServer: 32520\n  # Explicit nodePort for the console (only has effect when type=NodePort)\n  nodePortConsole:\n  # Service annotations (useful for MetalLB or other controllers)\n  annotations: {}\n\ninitChown:\n  # When enabled, an init container will chown mounted volumes to the non-root UID/GID\n  enabled: true\n  # A small image with sh and chown (default: busybox). Can be overridden if your distro needs different tools.\n  image: busybox:1.37.0\n  # Extra directories to chown in addition to /data\n  extraDirs: []\n\n# Optional envFrom references to import many env vars from a ConfigMap or Secret\nenvFrom:\n  # Name of a ConfigMap whose keys should be imported as env vars (optional)\n  configMapName: \"\"\n  # If true, the configMapRef will be marked optional\n  configMapOptional: false\n  # Name of a Secret whose keys should be imported as env vars (optional)\n  secretName: \"\"\n  # If true, the secretRef will be marked optional\n  secretOptional: false\n\n# Additional volumes on the output Deployment definition.\nvolumes: []\n\n# Additional volumeMounts on the output Deployment definition.\nvolumeMounts: []\n# - name: foo\n#   mountPath: \"/etc/foo\"\n#   readOnly: true\n\nnodeSelector: {}\n\ntolerations: []\n\naffinity: {}\n"}},{"name":"istio-ingress","description":"A flexible Istio ingress subchart for managing Gateway and VirtualService resources","appVersion":"1.0.0","latestVersion":"0.1.10","icon":"","home":"","keywords":[],"versions":["0.1.10","0.1.9","0.1.8","0.1.7","0.1.5","0.1.4","0.1.0"],"valuesByVersion":{"0.1.9":"# Istio Ingress Subchart Configuration\n\n# Enable/disable the entire subchart\nenabled: true\n\n# Gateway configuration\ngateway:\n  enabled: true\n  # Generate gateway name from app label if not specified\n  name: \"\"\n  namespace: \"\"\n\n  # Pod selector for the Istio ingress gateway\n  selector:\n    istio: ingress\n\n  # Gateway servers - can be overridden completely or merged\n  servers:\n    - port:\n        number: 80\n        protocol: HTTP\n        name: http\n      hosts:\n        - \"*\"\n\n# VirtualService configuration\nvirtualService:\n  enabled: true\n  # Generate name from parent chart if not specified\n  name: \"\"\n  namespace: \"\"\n\n  # Hosts for the VirtualService\n  hosts:\n    - \"\"\n\n  # Gateway references (auto-filled if using local gateway)\n  gateways: []\n\n  # HTTP routes - can be extended with custom routes\n  http: []\n    # Example:\n    # - name: \"api-route\"\n    #   match:\n    #     - uri:\n    #         prefix: \"/api\"\n    #   route:\n    #     - destination:\n    #         host: api.default.svc.cluster.local\n    #         port:\n    #           number: 8080\n\n  # TLS routes (for passthrough/SNI routing)\n  tls: []\n\n  # TCP routes\n  tcp: []\n\n  # Export to other namespaces\n  exportTo: []\n\n# TLS configuration\ntls:\n  enabled: false\n  mode: SIMPLE # SIMPLE, MUTUAL, AUTO_PASSTHROUGH, ISTIO_MUTUAL\n\n  # For Kubernetes: secret name with tls.crt and tls.key\n  credentialName: \"\"\n\n  # For file paths (non-Kubernetes)\n  serverCertificate: \"\"\n  privateKey: \"\"\n\n  # HTTPS redirect\n  httpsRedirect: false\n\n  # Optional: CA certificate for MUTUAL mode\n  caCertificates: \"\"\n  caCertCredentialName: \"\"\n\n  # TLS settings\n  minProtocolVersion: TLSV1_2\n  maxProtocolVersion: \"\"\n  cipherSuites: []\n\n# DNS annotations (external-dns integration)\nexternalDns:\n  enabled: false\n  # Annotations to add for DNS\n  annotations:\n    external-dns.alpha.kubernetes.io/hostname: \"\"\n    external-dns.alpha.kubernetes.io/ttl: \"3600\"\n\n# Helpers\nhelpers:\n  # If true, will automatically construct gateway reference from local gateway\n  useLocalGateway: true\n\n  # If true, will append VirtualService routes instead of replacing\n  mergeRoutes: false\n\n# Override mode: \"virtualservice\" (default) or \"gateway\"\nresourceType: \"virtualservice\"\n\n# Allow complete override of Gateway spec\ngatewayOverride: {}\n\n# Allow complete override of VirtualService spec\nvirtualServiceOverride: {}\n","0.1.10":"# Istio Ingress Subchart Configuration\n\n# Enable/disable the entire subchart\nenabled: true\n\n# Gateway configuration\ngateway:\n  enabled: true\n  # Generate gateway name from app label if not specified\n  name: \"\"\n  namespace: \"\"\n\n  # Pod selector for the Istio ingress gateway\n  selector:\n    istio: ingress\n\n  # Gateway servers - can be overridden completely or merged\n  servers:\n    - port:\n        number: 80\n        protocol: HTTP\n        name: http\n      hosts:\n        - \"*\"\n    # Example HTTPS server (uncomment and configure tls block)\n    # - port:\n    #     number: 443\n    #     protocol: HTTPS\n    #     name: https\n    #   hosts:\n    #     - \"*\"\n\n# VirtualService configuration\nvirtualService:\n  enabled: true\n  # Generate name from parent chart if not specified\n  name: \"\"\n  namespace: \"\"\n\n  # Hosts for the VirtualService\n  hosts:\n    - \"\"\n\n  # Gateway references (auto-filled if using local gateway)\n  gateways: []\n\n  # HTTP routes - can be extended with custom routes\n  http: []\n    # Example:\n    # - name: \"api-route\"\n    #   match:\n    #     - uri:\n    #         prefix: \"/api\"\n    #   route:\n    #     - destination:\n    #         host: api.default.svc.cluster.local\n    #         port:\n    #           number: 8080\n\n  # TLS routes (for passthrough/SNI routing)\n  tls: []\n\n  # TCP routes\n  tcp: []\n\n  # Export to other namespaces\n  exportTo: []\n\n# TLS configuration\ntls:\n  enabled: false\n  mode: SIMPLE # SIMPLE, MUTUAL, AUTO_PASSTHROUGH, ISTIO_MUTUAL\n\n  # For Kubernetes: secret name with tls.crt and tls.key\n  # Cluster default: cloudflare-client-tls\n  credentialName: \"clou on.\n  tag: \"latest\"\n\nimagePullSecrets: []\nnameOverride: \"\"\nfullnameOverride: \"\"\n\nserviceAccount:\n  # Specifies whether a service account should be created.\n  create: true\n  # Annotations to add to the service account.\n  annotations: {}\n  # The name of the service account to use.\n  # If not set and create is true, a name is generated using the fullname template.\n  name: \"\"\n\npodAnnotations:\n  prometheus.io/scrape: \"true\"\n  prometheus.io/port: \"5080\"\n  prometheus.io/path: \"/metrics\"\n\npodSecurityContext: {}\n  # fsGroup: 2000\n\nsecurityContext: {}\n  # capabilities:\n  #   drop:\n  #   - ALL\n  # readOnlyRootFilesystem: true\n  # runAsNonRoot: true\n  # runAsUser: 1000\n\nservice:\n  type: ClusterIP\n  annotations: {}\n  ports:\n    http: 5080\n    grpc: 5081\n\n# Configuration for OpenObserve\nconfig:\n  # ZO_LOCAL_MODE=false to enable S3 and Postgres\n  localMode: false\n  # RUST_LOG level\n  logLevel: info\n  # Enable/disable telemetry\n  telemetry: true\n  # ZO_MEMORY_CACHE_MAX_SIZE as a percentage of memory limit\n  memoryCacheMaxSizePercentage: 50\n  # S3 configuration (non-sensitive parts)\n  s3:\n    bucket: \"openobserve\"\n    serverUrl: \"s3.amazonaws.com\"\n    region: \"us-east-1\"\n\ningress:\n  enabled: false\n  className: \"istio\"\n  annotations: {}\n    # kubernetes.io/ingress.class: nginx\n    # kubernetes.io/tls-acme: \"true\"\n  hosts:\n    - host: chart-example.local\n      paths:\n        - path: /\n          pathType: ImplementationSpecific\n  tls: []\n  #  - secretName: chart-example-tls\n  #    hosts:\n  #      - chart-example.local\n\nistio:\n  enabled: true\n  gatewayAnnotations: {}\n  virtualServiceAnnotations: {}\n  hosts:\n    - o2.example.com\n  # For GRPC, we need to specify it here\n  grpcPaths:\n    - /v1/otlp/*\n  tls: []\n    # - secretName: openobserve-tls\n    #   hosts:\n    #     - o2.example.com\n\npersistence:\n  enabled: true\n  storageClass: \"longhorn\"\n  size: 20Gi\n  accessModes:\n    - ReadWriteOnce\n\nresources:\n  # We usually recommend not to specify default resources and to leave this as a conscious\n  # choice for the user. This also increases chances charts run on environments with little\n  # resources, such as Minikube. If you do want to specify resources, uncomment the following\n  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.\n  limits:\n    cpu: 2\n    memory: 4Gi\n  requests:\n    cpu: 500m\n    memory: 1Gi\n\nexternalSecrets:\n  enabled: true\n  secretStore: my-secret-store\n  annotations: {}\n  # The name of the secret that will be created\n  secretName: openobserve-secret\n  # Keys to be fetched from the secret store\n  keys:\n    rootEmail: \"ZO_ROOT_USER_EMAIL\"\n    rootPassword: \"ZO_ROOT_USER_PASSWORD\"\n    s3AccessKey: \"ZO_S3_ACCESS_KEY\"\n    s3SecretKey: \"ZO_S3_SECRET_KEY\"\n    databaseUrl: \"ZO_DATABASE_URL\"\n\nserviceMonitor:\n  enabled: false\n  namespace: \"\"\n  interval: 30s\n  scrapeTimeout: 10s\n  labels: {}\n  annotations: {}\n\nargoCd:\n  mode: auto\n  instanceLabel: \"\"\n  commonAnnotations: {}\n  commonLabels: {}\n\nautoscaling:\n  enabled: false\n  minReplicas: 1\n  maxReplicas: 10\n  targetCPUUtilizationPercentage: 80\n  # targetMemoryUtilizationPercentage: 80\n\nnodeSelector: {}\n\ntolerations: []\n\naffinity: {}\n"}},{"name":"opentelemetry-collector","description":"A Helm chart for Kubernetes","appVersion":"0.150.1-386","latestVersion":"0.1.6","icon":"https://github.com/cncf/artwork/blob/main/projects/opentelemetry/icon/color/opentelemetry-icon-color.svg","home":"","keywords":[],"versions":["0.1.6","0.1.5","0.1.4","0.1.3","0.1.1","0.1.0"],"valuesByVersion":{"0.1.0":"#\n# PRODUCTION-GRADE OTEL COLLECTOR VALUES\n#\n\nnameOverride: \"otel-collector\"\nfullnameOverride: \"otel-collector\"\n\n# -- Deployment strategy, can be 'deployment' or 'daemonset'\n# For gateway a 'deployment' is preferred\n# For agent-per-node a 'daemonset' is preferred\nkind: \"deployment\"\n\nreplicaCount: 1\n\nimage:\n  repository: otel/opentelemetry-collector-contrib\n  pullPolicy: IfNotPresent\n  # Default tag is .Chart.AppVersion\n  tag: \"0.150.1-386\"\n\nimagePullSecrets: []\n\n# -- Annotations for the Collector Pods\npodAnnotations: {}\n\n# -- Security Context for the Pod\npodSecurityContext:\n  runAsNonRoot: true\n  runAsUser: 10001\n  runAsGroup: 10001\n  fsGroup: 10001\n\n# -- Security Context for the Collector container\nsecurityContext:\n  readOnlyRootFilesystem: true\n  allowPrivilegeEscalation: false\n  capabilities:\n    drop:\n      - ALL\n\n# -- Kubernetes resource requests and limits\nresources:\n  limits:\n    cpu: 1000m\n    memory: 1Gi\n  requests:\n    cpu: 200m\n    memory: 256Mi\n\n# -- The core configuration for the OpenTelemetry Collector\n# This section directly translates to the otel-config.yaml\n# See: https://opentelemetry.io/docs/collector/configuration/\nconfig:\n  #\n  # RECEIVERS\n  #\n  receivers:\n    otlp:\n      protocols:\n        grpc:\n          endpoint: \"0.0.0.0:4317\"\n        http:\n          endpoint: \"0.0.0.0:4318\"\n\n  #\n  # PROCESSORS\n  #\n  # NOTE: The 'memory_limiter' and 'batch' processors are automatically added with sane defaults.\n  processors:\n    # Example:\n    # k8sattributes:\n    #   auth_type: \"serviceAccount\"\n    #   passthrough: false\n    #   filter:\n    #     node_from_env_var: KUBE_NODE_NAME\n    #   extract:\n    #     metadata:\n    #       - \"k8s.pod.name\"\n    #       - \"k8s.pod.uid\"\n    #       - \"k8s.deployment.name\"\n    #       - \"k8s.namespace.name\"\n    #       - \"k8s.node.name\"\n    #       - \"k8s.pod.start_time\"\n    resourcedetection:\n      detectors: [\"env\", \"gcp\", \"ec2\", \"ecs\", \"eks\"]\n      timeout: 2s\n      override: false\n\n  #\n  # EXPORTERS\n  #\n  exporters:\n    # Example:\n    # otlp/tempo:\n    #   endpoint: \"tempo.mimir.svc.cluster.local:4317\"\n    #   tls:\n    #     insecure: true\n    logging:\n      loglevel: debug\n\n  #\n  # EXTENSIONS\n  #\n  extensions:\n    health_check: {}\n    memory_ballast:\n      # In general, this should be set to 1/3 of the memory allocated to the collector.\n      # It is not used by default but can be enabled.\n      size_mib: 0\n\n  #\n  # SERVICE (PIPELINES)\n  #\n  service:\n    extensions: [health_check]\n    pipelines:\n      # -- Traces pipeline\n      traces:\n        receivers: [otlp]\n        processors: [memory_limiter, batch]\n        exporters: [logging]\n      # -- Metrics pipeline\n      metrics:\n        receivers: [otlp]\n        processors: [memory_limiter, batch]\n        exporters: [logging]\n      # -- Logs pipeline\n      logs:\n        receivers: [otlp]\n        processors: [memory_limiter, batch]\n        exporters: [logging]\n\n# -- Dynamic Memory Limiter\n# Automatically calculates the memory_limiter's `limit_mib` based on a percentage\n# of the Kubernetes memory limit, ensuring they never drift apart.\nmemory_limiter:\n  # -- Enable the dynamic memory limiter processor\n  enabled: true\n  # -- The percentage of `resources.limits.memory` to use for the memory limiter\n  percentage_of_limit: 75\n  # -- The spike limit as a percentage of the limit\n  spike_percentage: 25\n\n# -- Batch Processor Tuning\n# Provides sane defaults for high-throughput scenarios to minimize syscalls.\nbatch_processor:\n  # -- Enable the batch processor\n  enabled: true\n  # -- Timeout for sending a batch\n  timeout: 1s\n  # -- Number of events to buffer before sending a batch\n  send_batch_size: 8192\n\n# -- Hot-reloading of config via a ConfigMap checksum annotation on the deployment\nconfig_reload:\n  enabled: true\n\n# -- RBAC settings for processors like `k8sattributes` and `resourcedetection`\nrbac:\n  # -- Specifies whether RBAC resources should be created\n  create: true\n  serviceAccount:\n    # -- Specifies whether a service account should be created\n    create: true\n    # -- The name of the service account to use.\n    # If not set and create is true, a name is generated using the fullname template\n    name: \"\"\n    annotations: {}\n\n# -- NetworkPolicy to lock down ingress traffic\nnetworkPolicy:\n  # -- Keep disabled by default so collector endpoints are open within the cluster.\n  enabled: false\n  # -- Allows traffic from the Prometheus operator namespace for scraping metrics\n  allowPrometheusScraping: false\n  # -- Namespace names allowed to scrape when allowPrometheusScraping=true.\n  prometheusNamespaces:\n    - monitoring\n\n# -- Service definitions\nservice:\n  main:\n    enabled: true\n    type: ClusterIP\n    ports:\n      grpc:\n        port: 4317\n        targetPort: 4317\n        protocol: TCP\n      http:\n        port: 4318\n        targetPort: 4318\n        protocol: TCP\n\n  # -- A headless service for client-side load balancing (useful for gateway deployments)\n  headless:\n    enabled: false\n    ports:\n      grpc:\n        port: 4317\n        protocol: TCP\n      http:\n        port: 4318\n        protocol: TCP\n\n# -- Self-Observability Settings\nobservability:\n  # -- Enable scraping the collector's own metrics\n  enabled: true\n  # -- Create a ServiceMonitor for the Prometheus Operator\n  serviceMonitor:\n    enabled: true\n    namespace: \"\" # Defaults to .Release.Namespace\n    interval: 15s\n    scrapeTimeout: 10s\n    labels: {}\n    annotations: {}\n  # -- Alternatively, use pod annotations for scraping\n  podAnnotations:\n    prometheus.io/scrape: \"true\"\n    prometheus.io/port: \"8888\" # Default telemetry port\n    prometheus.io/path: \"/metrics\"\n","0.1.1":"#\n# PRODUCTION-GRADE OTEL COLLECTOR VALUES\n#\n\nnameOverride: \"otel-collector\"\nfullnameOverride: \"otel-collector\"\n\n# -- Deployment strategy, can be 'deployment' or 'daemonset'\n# For gateway a 'deployment' is preferred\n# For agent-per-node a 'daemonset' is preferred\nkind: \"deployment\"\n\nreplicaCount: 1\n\nimage:\n  repository: otel/opentelemetry-collector-contrib\n  pullPolicy: IfNotPresent\n  # D plication, see https://github.com/mbround18/valheim-docker for possible values\nenvironment:\n  - name: AUTO_BACKUP\n    value: \"1\"\n  - name: AUTO_BACKUP_DAYS_TO_LIVE\n    value: \"7\"\n  - name: AUTO_BACKUP_ON_SHUTDOWN\n    value: \"1\"\n  - name: AUTO_BACKUP_ON_UPDATE\n    value: \"1\"\n  - name: AUTO_BACKUP_REMOVE_OLD\n    value: \"1\"\n  - name: AUTO_BACKUP_SCHEDULE\n    value: \"*/15 * * * *\"\n  - name: AUTO_UPDATE\n    value: \"1\"\n  - name: AUTO_UPDATE_PAUSE_WITH_PLAYERS\n    value: \"1\"\n  - name: AUTO_UPDATE_SCHEDULE\n    value: 12 * * * *\n  - name: ENABLE_CROSSPLAY\n    value: \"0\"\n  - name: GUID\n    value: *containergid\n  - name: HTTP_PORT\n    value: *httpport\n  - name: NAME\n    value: Valheim Docker\n  - name: PASSWORD\n    value: Strong! Password @ Here\n  - name: PORT\n    value: *gameport\n  - name: PUBLIC\n    value: \"1\"\n  - name: PUID\n    value: *containerpid\n  - name: TZ\n    value: America/Chicago\n  - name: UPDATE_ON_STARTUP\n    value: \"1\"\n  - name: WORLD\n    value: Dedicated\n\n# The name of the storage class to use. If not set, the default storage class will be used.\nstorageClassName: \"\"\n\n#NodePort or LoadBalancer\nservice:\n  type: LoadBalancer\n  #this is ignored if type is not NodePort (Range: 30000-32767 - make sure your starting port is at least 3 ports below 32767)\n  nodePortGame: 31232\n  # if you use MetalLB, add the correct annotations here to select i.e. the pool and or the ip\n  # hint: the annotations changed in recent versions of metallb from metallb.universe.tf to metallb.io\n  # if the ipaddresspool in use has `autoassign: true` you can specify the ip you want to assign, without autoassign you also need to specify the name\n  # leaving out the annotations and assuming autoassign: true you get the next free ip from an available pool\n  annotations:\n    metallb.io/loadBalancerIPs: 10.100.14.175\n  #  metallb.io/address-pool: mypool\n\n# Configuration for the application image\nimage:\n  registry: docker.io\n  repository: mbround18/valheim\n  pullPolicy: Always\n  # Overrides the image tag, default is the chart appVersion.\n  tag: \"3.6\"\n\n# The secrets to use for pulling images\nimagePullSecrets: []\nnameOverride: \"\"\nfullnameOverride: \"\"\n\nargoCd:\n  mode: auto\n  instanceLabel: \"\"\n  commonAnnotations: {}\n  commonLabels: {}\n\n# Configuration for the service account\nserviceAccount:\n  # Specifies whether a service account should be created\n  create: true\n  # Automatically mount a ServiceAccount's API credentials?\n  automount: false\n  # Annotations to add to the service account\n  annotations: {}\n  # The name of the service account to use.\n  # If not set and create is true, a name is generated using the fullname template\n  name: \"\"\n\n# Annotations to add to the pod\npodAnnotations: {}\n# Labels to add to the pod\npodLabels: {}\n\n# The security context for the pod\npodSecurityContext:\n  fsGroup: 1000\n  fsGroupChangePolicy: OnRootMismatch\n\n# The security context for the container\n# Note: valheim-docker uses s6-overlay (starts as root, drops to PUID).\n# runAsNonRoot cannot be set here without breaking the init process.\nsecurityContext:\n  allowPrivilegeEscalation: false\n  seccompProfile:\n    type: RuntimeDefault\n\n# The resources to allocate for the pod\nresources:\n  requests:\n    cpu: 500m\n    memory: 1Gi\n  limits:\n    memory: 4Gi\n\n# Configuration for autoscaling\nautoscaling:\n  enabled: false\n  minReplicas: 1\n  maxReplicas: 100\n  targetCPUUtilizationPercentage: 80\n  # targetMemoryUtilizationPercentage: 80\n\n# The configuration for the deployment PVC\ndeployment:\n  pvc:\n    name: data\n    size: 10Gi\n\nsaves:\n  pvc:\n    name: saves\n    size: 10Gi\n\nbackup:\n  pvc:\n    name: backups\n    size: 10Gi\n\n# The node selector to use for the pod\nnodeSelector: {}\n\n# The tolerations to use for the pod\ntolerations: []\n\n# The affinity to use for the pod\naffinity: {}\n","0.4.14":"# Default values for valheim.\n# Thi   const HELM_REPO_URL = "https://mbround18.github.io/helm-charts";

  const index = new FlexSearch.Document({
    document: {
      id: "name",
      index: ["name", "description", "keywords"],
    },
    tokenize: "forward",
  });

  CHARTS.forEach(c => index.add({ ...c, keywords: (c.keywords || []).join(" ") }));

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function buildCard(chart) {
    const iconHtml = chart.icon
      ? `<img class="card-icon" src="${escapeHtml(chart.icon)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="card-icon-placeholder" style="display:none">⎈</div>`
      : `<div class="card-icon-placeholder">⎈</div>`;

    const tagsHtml = (chart.keywords || []).slice(0, 5)
      .map(k => `<span class="tag">${escapeHtml(k)}</span>`).join("");

    const versionOptions = (chart.versions || [])
      .map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");

    const homeLink = chart.home
      ? `<a href="${escapeHtml(chart.home)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${escapeHtml(chart.name)}</a>`
      : escapeHtml(chart.name);

    return `
      <div class="card" id="card-${escapeHtml(chart.name)}" onclick="toggleCard(this, '${escapeHtml(chart.name)}')">
        <div class="card-header">
          ${iconHtml}
          <div style="flex:1;min-width:0">
            <div class="card-title">${homeLink}</div>
            <div class="card-version">
              <span class="badge"><span class="dot"></span>v${escapeHtml(chart.latestVersion)}</span>
              ${chart.appVersion ? `<span class="badge" style="margin-left:4px">app ${escapeHtml(String(chart.appVersion))}</span>` : ""}
            </div>
          </div>
        </div>
        ${chart.description ? `<div class="card-desc">${escapeHtml(chart.description)}</div>` : ""}
        ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ""}
        <div class="card-detail">
          <div class="version-row">
            <span class="version-label">Version:</span>
            <select class="version-select" id="sel-${escapeHtml(chart.name)}" onclick="event.stopPropagation()" onchange="onVersionChange('${escapeHtml(chart.name)}', this.value)">
              ${versionOptions}
            </select>
          </div>
          <div class="install-cmd" id="cmd-${escapeHtml(chart.name)}">
            <span id="cmdtext-${escapeHtml(chart.name)}">helm install ${escapeHtml(chart.name)} ${escapeHtml(HELM_REPO_URL)}/${escapeHtml(chart.name)} --version ${escapeHtml(chart.latestVersion)}</span>
            <button class="copy-btn" onclick="copyCmd('${escapeHtml(chart.name)}', event)" title="Copy">⎘</button>
          </div>
          <button class="values-toggle" onclick="toggleValues('${escapeHtml(chart.name)}', event)">Show values.yaml ▾</button>
          <div class="values-block" id="vals-${escapeHtml(chart.name)}">
            <pre id="valspre-${escapeHtml(chart.name)}"></pre>
          </div>
        </div>
      </div>`;
  }

  function toggleCard(el, name) {
    el.classList.toggle("open");
  }

  function onVersionChange(name, version) {
    const cmdText = document.getElementById(`cmdtext-${name}`);
    if (cmdText) {
      cmdText.textContent = `helm install ${name} ${HELM_REPO_URL}/${name} --version ${version}`;
    }
    const valsBlock = document.getElementById(`vals-${name}`);
    const valsPre = document.getElementById(`valspre-${name}`);
    if (valsBlock && valsBlock.classList.contains("open") && valsPre) {
      const chart = CHARTS.find(c => c.name === name);
      valsPre.textContent = (chart && chart.valuesByVersion && chart.valuesByVersion[version]) || "# values.yaml not available for this version";
    }
  }

  function toggleValues(name, event) {
    event.stopPropagation();
    const btn = event.currentTarget;
    const block = document.getElementById(`vals-${name}`);
    const pre = document.getElementById(`valspre-${name}`);
    if (!block) return;
    const opening = !block.classList.contains("open");
    block.classList.toggle("open");
    btn.textContent = opening ? "Hide values.yaml ▴" : "Show values.yaml ▾";
    if (opening && pre && !pre.textContent) {
      const sel = document.getElementById(`sel-${name}`);
      const version = sel ? sel.value : "";
      const chart = CHARTS.find(c => c.name === name);
      pre.textContent = (chart && chart.valuesByVersion && chart.valuesByVersion[version]) || "# values.yaml not available for this version";
    }
  }

  function copyCmd(name, event) {
    event.stopPropagation();
    const cmdText = document.getElementById(`cmdtext-${name}`);
    if (cmdText) navigator.clipboard.writeText(cmdText.textContent).catch(() => {});
  }

  function copyHelmRepo(btn) {
    navigator.clipboard.writeText(`helm repo add mbround18 ${HELM_REPO_URL}`).then(() => {
      const orig = btn.querySelector("span:last-child").textContent;
      btn.querySelector("span:last-child").textContent = "Copied!";
      setTimeout(() => { btn.querySelector("span:last-child").textContent = orig; }, 1500);
    }).catch(() => {});
  }

  let currentCards = CHARTS.map(c => c.name);

  function render(names) {
    const grid = document.getElementById("grid");
    const noResults = document.getElementById("no-results");
    const count = document.getElementById("results-count");
    if (!names || names.length === 0) {
      grid.innerHTML = "";
      noResults.style.display = "";
      count.textContent = "";
    } else {
      noResults.style.display = "none";
      const filtered = CHARTS.filter(c => names.includes(c.name));
      grid.innerHTML = filtered.map(buildCard).join("");
      count.textContent = `Showing ${filtered.length} of ${CHARTS.length} charts`;
    }
  }

  document.getElementById("stats").textContent = `${CHARTS.length} charts`;
  render(CHARTS.map(c => c.name));

  let debounceTimer;
  document.getElementById("search").addEventListener("input", e => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      const q = e.target.value.trim();
      if (!q) {
        render(CHARTS.map(c => c.name));
        return;
      }
      const results = index.search(q, { enrich: true });
      const names = [...new Set(results.flatMap(r => r.result.map(x => x.id)))];
      render(names.length ? names : []);
    }, 150);
  });
  </script>
