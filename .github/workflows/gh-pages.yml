name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

permissions:
  contents: write

jobs:
  validation:
    name: Helm Validation
    uses: ./.github/workflows/helm.yml
    with:
      run-build: false

  publish:
    name: Package and Publish Charts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - validation
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # 1b10c78, https://github.com/actions/create-github-app-token/releases/latest
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure Git
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # 45bfe01, https://github.com/actions/configure-pages/releases/latest

      - name: Setup Python
        uses: ./.github/actions/setup-python

      - name: Setup Helm
        uses: ./.github/actions/setup-helm

      - name: Update Chart Version
        run: uv run tools/version_checker.py
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Run chart-releaser
        if: github.event_name != 'pull_request'
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # cae68fe, https://github.com/helm/chart-releaser-action/releases/latest
        with:
          charts_dir: charts
          config: cr.yaml
          skip_existing: true
        env:
          CR_TOKEN: "${{ steps.app-token.outputs.token }}"
