name: Helm Validation

on:
  pull_request:
    branches:
      - "main"
  workflow_call:
    inputs:
      run-build:
        description: "Run the package build job as part of validation"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI_PYTEST_ADDOPTS: --color=yes -rA --durations=20

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest

      - name: Setup Python
        uses: ./.github/actions/setup-python

      - name: Setup Helm
        uses: ./.github/actions/setup-helm

      - name: Lint charts
        run: make lint

  python-tests:
    name: Python Tool Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest

      - name: Setup Python
        uses: ./.github/actions/setup-python

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Create test results directory
        run: mkdir -p .artifacts/test-results

      - name: Run Python tool tests
        run: uv run pytest tools/tests
          --junitxml=.artifacts/test-results/python-tool-tests.xml
        env:
          PYTEST_ADDOPTS: ${{ env.CI_PYTEST_ADDOPTS }}

      - name: Summarize Python tool tests
        if: always()
        uses: ./.github/actions/summarize-junit
        with:
          report-path: .artifacts/test-results/python-tool-tests.xml
          report-title: Python Tool Tests

      - name: Upload Python tool test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 043fb46, https://github.com/actions/upload-artifact/releases/latest
        with:
          name: python-tool-test-results
          path: .artifacts/test-results/python-tool-tests.xml

  manifest-tests:
    name: Manifest Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest

      - name: Setup Python
        uses: ./.github/actions/setup-python

      - name: Setup Helm
        uses: ./.github/actions/setup-helm

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Check Python syntax
        run:
          find . -name "*.py" -not -path "./.venv/*" -not -path "./.*" -print0 |
          xargs -0 -n 50 -P "$(nproc 2>/dev/null || echo 4)" python3 -m
          py_compile

      - name: Create test results directory
        run: mkdir -p .artifacts/test-results

      - name: Run manifest contract tests
        run: uv run pytest charts/tests/test_manifest_contracts.py
          --junitxml=.artifacts/test-results/manifest-contract-tests.xml
        env:
          PYTEST_ADDOPTS: ${{ env.CI_PYTEST_ADDOPTS }}

      - name: Summarize manifest contract tests
        if: always()
        uses: ./.github/actions/summarize-junit
        with:
          report-path: .artifacts/test-results/manifest-contract-tests.xml
          report-title: Manifest Contract Tests

      - name: Upload manifest contract test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 043fb46, https://github.com/actions/upload-artifact/releases/latest
        with:
          name: manifest-contract-test-results
          path: .artifacts/test-results/manifest-contract-tests.xml

  chart-tests:
    name: Chart Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest

      - name: Setup Python
        uses: ./.github/actions/setup-python

      - name: Setup Helm
        uses: ./.github/actions/setup-helm

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Create test results directory
        run: mkdir -p .artifacts/test-results

      - name: Run chart tests
        run:
          uv run pytest charts --ignore=charts/tests/test_manifest_contracts.py
          --junitxml=.artifacts/test-results/chart-tests.xml
        env:
          PYTEST_ADDOPTS: ${{ env.CI_PYTEST_ADDOPTS }}

      - name: Summarize chart tests
        if: always()
        uses: ./.github/actions/summarize-junit
        with:
          report-path: .artifacts/test-results/chart-tests.xml
          report-title: Chart Tests

      - name: Upload chart test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 043fb46, https://github.com/actions/upload-artifact/releases/latest
        with:
          name: chart-test-results
          path: .artifacts/test-results/chart-tests.xml

  build:
    name: Helm Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event_name != 'workflow_call' || inputs.run-build }}
    needs:
      - lint
      - python-tests
      - manifest-tests
      - chart-tests
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest

      - name: Setup Helm
        uses: ./.github/actions/setup-helm

      - name: Build Helm charts
        run: make build

      - name: Upload packaged charts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 043fb46, https://github.com/actions/upload-artifact/releases/latest
        with:
          name: packaged-charts
          path: tmp/*.tgz
